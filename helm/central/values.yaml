# ─── ArgoCD namespace ─────────────────────────────────────────────────────────
argocd:
  namespace: openshift-gitops

# ─── Services cluster (managed by central ArgoCD) ────────────────────────────
servicesCluster:
  server: "https://api.shcservices.lab.signal9.gg:6443"

# ─── OCI registry that stores platform Helm charts ───────────────────────────
oci:
  registry: "quay.signal9.gg"
  repositoryBase: "hybrid-sovereign"

# ─── Sovereign Namespaces (central cluster) ──────────────────────────────────
sovereignNamespaces:
  enabled: true
  chartVersion: "0.2.1"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud-jobs
        enabled: true
      - name: sovereign-cloud-helpers
        enabled: true

# ─── Sovereign Namespaces (services cluster) ────────────────────────────────
sovereignNamespacesServices:
  enabled: true
  chartVersion: "0.2.1"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud-jobs
        enabled: true
      - name: sovereign-cloud-helpers
        enabled: true
      - name: sovereign-cloud
        enabled: true
      - name: sovereign-cloud-plugins
        enabled: true

# ─── RHBK Central (Keycloak) ─────────────────────────────────────────────────
rhbk:
  enabled: true
  chartVersion: "0.10.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: rhbk-central
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-central-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 1
      hostname: "rhbk-central.apps.shc-central.lab.signal9.gg"
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK Services (Keycloak) ────────────────────────────────────────────────
rhbkServices:
  enabled: true
  chartVersion: "0.10.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: rhbk-services
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-services-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 1
      hostname: "rhbk-services.apps.shcservices.lab.signal9.gg"
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK Config (DEPRECATED) ────────────────────────────────────────────────
rhbkConfig:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "30"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    ansibleJob:
      enabled: false

# ─── ACS (disabled) ──────────────────────────────────────────────────────────
acs:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: true
      namespace: stackrox
      instanceName: stackrox-central-services
    consolePlugin:
      enabled: true

acsServices:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: false
    consolePlugin:
      enabled: true

# ─── Vault Central ───────────────────────────────────────────────────────────
vault:
  enabled: true
  chartVersion: "0.5.0"
  syncWave: "15"
  values:
    pushSecretToVault: true
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-central.apps.shc-central.lab.signal9.gg
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── Vault Services ─────────────────────────────────────────────────────────
vaultServices:
  enabled: true
  chartVersion: "0.6.4"
  syncWave: "15"
  values:
    pushSecretToVault: false
    ociCredentials:
      enabled: true
      vaultPath: "oci-credentials"
      secretStoreName: "vault-backend"
      secretStoreKind: "ClusterSecretStore"
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
                retry_join {
                  leader_api_addr = "http://vault-services-0.vault-services-internal.vault.svc:8200"
                }
                retry_join {
                  leader_api_addr = "http://vault-services-1.vault-services-internal.vault.svc:8200"
                }
                retry_join {
                  leader_api_addr = "http://vault-services-2.vault-services-internal.vault.svc:8200"
                }
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-services.apps.shcservices.lab.signal9.gg
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── Vault Services Init (separate App to avoid StatefulSet health deadlock) ─
vaultServicesInit:
  enabled: true
  chartVersion: "0.2.2"
  syncWave: "20"
  values:
    namespace: vault
    serviceAccount: vault-init-runner
    image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
    imagePullSecretName: "quay-pull-secret"
    secretName: "vault-services-init-secrets"
    vaultAddr: "http://vault-services-0.vault-services-internal.vault.svc:8200"
    vaultNamespace: "vault"
    activeDeadlineSeconds: 600
    backoffLimit: 5
    pushSecretToVaultCentral: true
    pushSecretStoreName: "vault-backend"
    vaultCentralPath: "vault-services-init"

# ─── RHACM ───────────────────────────────────────────────────────────────────
rhacm:
  enabled: false
  chartVersion: "0.5.0"
  enableMultiClusterHub: true
  destinationNamespace: open-cluster-management
  syncWave: "10"
  values:
    operator:
      channel: release-2.16
      installPlanApproval: Automatic
    multiClusterHub:
      enabled: true
      availabilityConfig: High
      disableHubSelfManagement: false
      components:
        console: true
        search: true
        cluster-lifecycle: true
        volsync: false
        cluster-backup: false

# ─── AAP (services cluster) ─────────────────────────────────────────────────
aap:
  enabled: false
  chartVersion: "0.5.1"
  syncWave: "30"
  destinationNamespace: aap
  values:
    namespace: aap
    instance:
      enabled: true
      name: sovereign-aap
    controller:
      enabled: true
    eda:
      enabled: true
    hub:
      enabled: false
    postgres:
      enabled: false

# ─── ODF / Noobaa (central) ─────────────────────────────────────────────────
odf:
  enabled: false
  chartVersion: "0.5.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── ODF / Noobaa (services) ────────────────────────────────────────────────
odfServices:
  enabled: false
  chartVersion: "0.5.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── Quay (central) ─────────────────────────────────────────────────────────
quay:
  enabled: false
  chartVersion: "0.5.1"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namespace: quay-enterprise
    registry:
      enabled: true
      name: sovereign-registry
      components:
        objectstorage:
          managed: true
        postgres:
          managed: true
        clair:
          managed: true
        redis:
          managed: true
        mirror:
          managed: true
        route:
          managed: true
        tls:
          managed: true
        monitoring:
          managed: false

# ─── Quay (services) ────────────────────────────────────────────────────────
quayServices:
  enabled: false
  chartVersion: "0.5.2"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: quay-enterprise
    registry:
      enabled: true
      name: svc-sovereign-registry
      configBundle: |
        FEATURE_USER_INITIALIZE: true
        FEATURE_SUPERUSERS_FULL_ACCESS: true
        SUPER_USERS:
          - sovereign_admin
        FEATURE_USER_CREATION: true
      configBundleSecretName: svc-sovereign-registry-config-bundle
      components:
        objectstorage:
          managed: true
        postgres:
          managed: true
        clair:
          managed: false
        redis:
          managed: true
        mirror:
          managed: false
        monitoring:
          managed: false
        horizontalpodautoscaler:
          managed: false
        clairpostgres:
          managed: false
        route:
          managed: true
        tls:
          managed: true
        quay:
          overrides:
            replicas: 1

# ─── Gitea (services cluster) ──────────────────────────────────────────────
gitea:
  enabled: true
  chartVersion: "0.4.3"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      image:
        registry: quay.signal9.gg
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        admin:
          # Credentials sourced from k8s Secret 'gitea-admin-credentials' (created by init chart from env vars)
          # DEVIATION: Gitea chart deploys at wave 18, before Vault is initialized (wave 23).
          # A k8s Secret pre-created during 'make init-central-argo' is used as a bridge.
          # Post-init, credentials are pushed to Vault via PushSecret in giteaInit job.
          existingSecret: "gitea-admin-credentials"
        config:
          server:
            DOMAIN: "gitea-gitea.apps.shcservices.lab.signal9.gg"
            ROOT_URL: "https://gitea-gitea.apps.shcservices.lab.signal9.gg"
          database:
            DB_TYPE: postgres
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/postgresql
          tag: "17.6.0-debian-12-r4"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
    pullSecret:
      # Disabled: quay-pull-secret is provisioned by the init chart via make init-central-argo.
      # The OCI robot credentials must NEVER be committed to git.
      enabled: false
      dockerconfigjson: ""
    giteaTokenExternalSecret:
      enabled: false
      targetNamespace: sovereign-cloud-plugins
      targetSecretName: gitea-admin-token
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    adminCredentialsExternalSecret:
      enabled: false
      namespace: gitea
      secretName: gitea-admin-credentials
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    pullSecretExternalSecret:
      enabled: false
      namespace: gitea
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: oci-credentials
      refreshInterval: "1h"

# ─── Gitea (central cluster instance) ───────────────────────────────────────
# Manages the Gitea instance running on the central cluster itself.
# This is separate from the services-cluster Gitea (managed by the 'gitea' app above).
giteaCentral:
  enabled: true
  chartVersion: "0.4.3"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      image:
        registry: quay.signal9.gg
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        admin:
          existingSecret: "gitea-admin-credentials"
        config:
          server:
            DOMAIN: "gitea-gitea.apps.shc-central.lab.signal9.gg"
            ROOT_URL: "https://gitea-gitea.apps.shc-central.lab.signal9.gg"
          database:
            DB_TYPE: postgres
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/postgresql
          tag: "17.6.0-debian-12-r4"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true
        tls:
          termination: edge
          insecureEdgeTerminationPolicy: Redirect
    pullSecret:
      enabled: false
      dockerconfigjson: ""
    giteaTokenExternalSecret:
      enabled: false
    adminCredentialsExternalSecret:
      enabled: false
      namespace: gitea
      secretName: gitea-admin-credentials
      secretStoreName: vault-backend
      secretStoreKind: ClusterSecretStore
      vaultPath: gitea-admin
      refreshInterval: "1h"
    pullSecretExternalSecret:
      enabled: false

# ─── Crunchy Postgres (central) ─────────────────────────────────────────────
crunchyPostgres:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namespace: openshift-operators

# ─── Crunchy Postgres (services) ────────────────────────────────────────────
crunchyPostgresServices:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namePrefix: "svc-"
    namespace: openshift-operators

# ─── External Secrets Operator (central) ────────────────────────────────────
externalSecrets:
  enabled: true
  chartVersion: "0.1.2"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── External Secrets Operator (services) ───────────────────────────────────
externalSecretsServices:
  enabled: true
  chartVersion: "0.1.2"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── Vault Central Namespace (backup copies of init secrets) ─────────────────
vaultCentralNamespace:
  enabled: false
  chartVersion: "0.1.0"
  syncWave: "27"
  values:
    namespace: vault-central
    secretStore:
      name: vault-backend
      kind: ClusterSecretStore
    vaultInitSecretsCopy:
      enabled: true
    vaultServicesInitSecretsCopy:
      enabled: true

# ─── Vault ClusterSecretStore (central) — uses k8s auth ─────────────────────
vaultSecretStore:
  enabled: false
  chartVersion: "0.3.0"
  syncWave: "22"
  values:
    vault:
      server: "http://vault-active.vault.svc:8200"
      path: "central"
    auth:
      type: kubernetes
      mountPath: "kubernetes-central"
      role: "external-secrets"
      serviceAccountName: "external-secrets-vault-sa"
      serviceAccountNamespace: "external-secrets"

# ─── Vault ClusterSecretStore (services → vault-central via external route) ─
# Uses kubernetes-services auth mount on central vault (k8s auth, no root token)
vaultSecretStoreServices:
  enabled: false
  chartVersion: "0.3.0"
  syncWave: "22"
  values:
    vault:
      server: "https://vault-central.apps.shc-central.lab.signal9.gg"
      path: "central"
      caBundle: ""
      # vault-central-token is delivered to the vault namespace on services cluster
      # by the deliver-vault-token job (sovereign-jobs chart)
      tokenSecretName: "vault-central-token"
      tokenSecretNamespace: "vault"
      tokenSecretKey: "root_token"

# ─── Sovereign Jobs RBAC ────────────────────────────────────────────────────
sovereignJobsRbac:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "3"
  values:
    namespace: sovereign-cloud-jobs
    serviceAccount: sovereign-ansible-runner
    imagePullSecrets:
      - name: quay-pull-secret

# ─── Sovereign Jobs (individual Ansible job Applications) ────────────────────
sovereignJobs:
  chartVersion: "0.1.0"
  namespace: sovereign-cloud-jobs
  serviceAccount: sovereign-ansible-runner
  image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
  backoffLimit: 5
  imagePullSecrets:
    - name: quay-pull-secret
  jobs:
    vaultInit:
      enabled: true
      playbook: vault-init.yml
      activeDeadlineSeconds: 600
      syncWave: "23"
      env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc:8200"
    vaultKv:
      enabled: true
      playbook: vault-kv.yml
      activeDeadlineSeconds: 600
      syncWave: "24"
      env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc:8200"
    deliverVaultToken:
      enabled: true
      playbook: deliver-vault-token.yml
      activeDeadlineSeconds: 300
      syncWave: "25"
      env:
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
        - name: TARGET_NAMESPACE
          value: "vault"
        - name: TARGET_SECRET_NAME
          value: "vault-central-token"
    vaultK8sAuth:
      enabled: true
      playbook: vault-k8s-auth.yml
      activeDeadlineSeconds: 600
      syncWave: "26"
      env:
        - name: VAULT_ADDR
          value: "http://vault-active.vault.svc:8200"
        - name: VAULT_SERVICES_ADDR
          value: "https://vault-services.apps.shcservices.lab.signal9.gg"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
    keycloakRealms:
      enabled: false
      playbook: keycloak-realms.yml
      activeDeadlineSeconds: 600
      syncWave: "26"
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
    keycloakGroups:
      enabled: false
      playbook: keycloak-groups.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
    keycloakClients:
      enabled: false
      playbook: keycloak-clients.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      pushSecrets:
        pushKeycloakClientSecrets:
          enabled: true
          secretName: keycloak-client-secrets
          data:
            - secretKey: quay-central
              remoteKey: central/data/keycloak-clients
              property: quay-central
            - secretKey: vault
              remoteKey: central/data/keycloak-clients
              property: vault
            - secretKey: gitea
              remoteKey: central/data/keycloak-clients
              property: gitea
            - secretKey: openshift-central
              remoteKey: central/data/keycloak-clients
              property: openshift-central
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
        - name: KEYCLOAK_CLIENTS
          value: '[{"realm":"sovereign-central","client_id":"quay-central","name":"Quay Central","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"vault","name":"Vault","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"gitea","name":"Gitea","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"openshift-central","name":"OpenShift Central","redirect_uris":["*"]}]'
        - name: SECRETS_NAMESPACE
          value: "sovereign-cloud-jobs"
    keycloakRbac:
      enabled: false
      playbook: keycloak-rbac.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
    keycloakOauth:
      enabled: false
      playbook: keycloak-oauth.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: KEYCLOAK_CENTRAL_URL
          value: "https://rhbk-central.apps.shc-central.lab.signal9.gg"
        - name: KEYCLOAK_SERVICES_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET
          value: "rhbk-services-initial-admin"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET_NS
          value: "rhbk"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
        - name: SERVICES_REALM_NAME
          value: "sovereign-tenants"
    giteaInit:
      enabled: false
      playbook: gitea-init.yml
      activeDeadlineSeconds: 600
      syncWave: "35"
      externalSecrets:
        giteaAdminCredentials:
          enabled: true
          targetSecretName: gitea-admin-credentials
          data:
            - secretKey: admin_user
              remoteKey: gitea-admin
              property: admin_user
            - secretKey: admin_password
              remoteKey: gitea-admin
              property: admin_password
            - secretKey: admin_token
              remoteKey: gitea-admin
              property: admin_token
      pushSecrets:
        pushGiteaAdmin:
          enabled: false
          secretName: gitea-credentials
          data:
            - secretKey: admin_user
              remoteKey: central/data/gitea-admin
              property: admin_user
            - secretKey: admin_password
              remoteKey: central/data/gitea-admin
              property: admin_password
            - secretKey: admin_token
              remoteKey: central/data/gitea-admin
              property: admin_token
      env:
        - name: GITEA_URL
          value: "http://gitea-gitea.apps.shcservices.lab.signal9.gg"
        - name: GITEA_ADMIN_USER
          value: "gitea_admin"
        - name: GITEA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitea-admin-credentials
              key: admin_password
        - name: SECRETS_NAMESPACE
          value: "sovereign-cloud-jobs"
    giteaCreateRepo:
      enabled: false
      playbook: gitea-create-repo.yml
      activeDeadlineSeconds: 300
      syncWave: "36"
      env:
        - name: GITEA_URL
          value: "http://gitea-gitea.apps.shcservices.lab.signal9.gg"
        - name: GITEA_ADMIN_USER
          value: "gitea_admin"
        - name: GITEA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitea-admin-credentials
              key: admin_password
        - name: REPO_NAME
          value: "tenancy_repo"
    keycloakServicesRealms:
      enabled: false
      playbook: keycloak-realms.yml
      activeDeadlineSeconds: 600
      syncWave: "28"
      externalSecrets:
        rhbkServicesAdmin:
          enabled: true
          targetSecretName: rhbk-services-admin
          data:
            - secretKey: username
              remoteKey: rhbk-services-admin
              property: username
            - secretKey: password
              remoteKey: rhbk-services-admin
              property: password
      env:
        - name: KEYCLOAK_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
        - name: REALM_NAME
          value: "sovereign-tenants"
    keycloakServicesGroups:
      enabled: false
      playbook: keycloak-groups.yml
      activeDeadlineSeconds: 600
      syncWave: "29"
      env:
        - name: KEYCLOAK_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
        - name: REALM_NAME
          value: "sovereign-tenants"
        - name: ADMIN_GROUP
          value: "sovereign-admin"
    keycloakServicesClients:
      enabled: false
      playbook: keycloak-clients.yml
      activeDeadlineSeconds: 600
      syncWave: "30"
      env:
        - name: KEYCLOAK_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
        - name: REALM_NAME
          value: "sovereign-tenants"
        - name: KEYCLOAK_CLIENTS
          value: '[{"realm":"sovereign-tenants","client_id":"openshift-services","name":"OpenShift Services","redirect_uris":["*"]},{"realm":"sovereign-tenants","client_id":"quay-services","name":"Quay Services","redirect_uris":["*"]},{"realm":"sovereign-tenants","client_id":"aap","name":"Ansible Automation Platform","redirect_uris":["*"]}]'
        - name: SECRETS_NAMESPACE
          value: "sovereign-cloud-jobs"
    vaultServicesInit:
      enabled: false
      playbook: vault-services-init.yml
      activeDeadlineSeconds: 600
      syncWave: "29"
      env:
        - name: VAULT_ADDR
          value: "https://vault-services.apps.shcservices.lab.signal9.gg"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
        - name: VAULT_SECRET_NAME
          value: "vault-services-init-secrets"
        - name: VAULT_SECRET_NAMESPACE
          value: "sovereign-cloud-jobs"
    vaultOidcAuth:
      enabled: false
      playbook: vault-oidc-auth.yml
      activeDeadlineSeconds: 600
      syncWave: "29"
      env:
        - name: VAULT_ADDR
          value: "http://vault-active.vault.svc:8200"
        - name: VAULT_SERVICES_ADDR
          value: "https://vault-services.apps.shcservices.lab.signal9.gg"
        # External HTTPS URL — Vault needs this to match the issuer in OIDC discovery doc.
        # central_ingress_ca_pem is fetched in pre_tasks and passed to the Vault OIDC config.
        - name: KEYCLOAK_CENTRAL_URL
          value: "https://rhbk-central.apps.shc-central.lab.signal9.gg"
        - name: KEYCLOAK_SERVICES_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_CENTRAL_REALM
          value: "sovereign-central"
        - name: KEYCLOAK_SERVICES_REALM
          value: "sovereign-tenants"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
    keycloakTestUsers:
      enabled: false
      playbook: keycloak-test-users.yml
      activeDeadlineSeconds: 300
      syncWave: "32"
      env:
        - name: KEYCLOAK_CENTRAL_URL
          value: "https://rhbk-central.apps.shc-central.lab.signal9.gg"
        - name: KEYCLOAK_SERVICES_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_CENTRAL_REALM
          value: "sovereign-central"
        - name: KEYCLOAK_SERVICES_REALM
          value: "sovereign-tenants"
        - name: KEYCLOAK_CENTRAL_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_CENTRAL_ADMIN_SECRET_NS
          value: "rhbk"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
    # Bootstraps the cluster_builds Gitea repo and its ArgoCD repo secret.
    # Idempotent — safe to re-run; repo creation and secret upsert are guarded.
    # Runs at wave 37 so the ApplicationSet (wave 50) can connect immediately.
    giteaClusterBuildsRepo:
      enabled: false
      playbook: gitea-cluster-builds.yml
      activeDeadlineSeconds: 300
      syncWave: "37"
      # No externalSecrets declared here — gitea-admin-credentials is already
      # owned by the giteaInit job (wave 35). Referencing it via secretKeyRef
      # avoids dual-ownership conflict with ESO creationPolicy: Owner.
      env:
        - name: GITEA_URL
          value: "https://gitea-gitea.apps.shcservices.lab.signal9.gg"
        - name: GITEA_ADMIN_USER
          value: "gitea_admin"
        - name: GITEA_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gitea-admin-credentials
              key: admin_password
        - name: GITEA_CREDENTIALS_SECRET
          value: "gitea-admin-credentials"
        - name: GITEA_CREDENTIALS_NAMESPACE
          value: "sovereign-cloud-jobs"
        - name: ARGOCD_NAMESPACE
          value: "openshift-gitops"

    # Creates Entity, AAPOrg, QuayOrg sample CRs via Ansible job.
    # Runs after all operators are deployed (wave 45) so their CRDs exist.
    # Disables broken chart-default samples that have incorrect field names.
    operatorSamples:
      enabled: false
      playbook: operator-samples.yml
      activeDeadlineSeconds: 900
      syncWave: "45"
      env:
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"


# ─── ArgoCD namespace ─────────────────────────────────────────────────────────
argocd:
  namespace: openshift-gitops

# ─── Services cluster (managed by central ArgoCD) ────────────────────────────
servicesCluster:
  server: "https://api.shcservices.lab.signal9.gg:6443"

# ─── OCI registry that stores platform Helm charts ───────────────────────────
oci:
  registry: "quay.signal9.gg"
  repositoryBase: "hybrid-sovereign"

# ─── Sovereign Namespaces (central cluster) ──────────────────────────────────
sovereignNamespaces:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud-jobs
        enabled: true
      - name: sovereign-cloud-helpers
        enabled: true

# ─── Sovereign Namespaces (services cluster) ────────────────────────────────
sovereignNamespacesServices:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud
        enabled: true
      - name: sovereign-cloud-plugins
        enabled: true

# ─── RHBK Central (Keycloak) ─────────────────────────────────────────────────
rhbk:
  enabled: false
  chartVersion: "0.10.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: rhbk-central
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-central-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 1
      hostname: "rhbk-central.apps.shc-central.lab.signal9.gg"
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK Services (Keycloak) ────────────────────────────────────────────────
rhbkServices:
  enabled: false
  chartVersion: "0.10.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: rhbk-services
    pushSecretToVault: true
    vaultSecretPath: "central/data/rhbk-services-admin"
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 1
      hostname: "rhbk-services.apps.shcservices.lab.signal9.gg"
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK Config (DEPRECATED) ────────────────────────────────────────────────
rhbkConfig:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "30"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    ansibleJob:
      enabled: false

# ─── ACS (disabled) ──────────────────────────────────────────────────────────
acs:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: true
      namespace: stackrox
      instanceName: stackrox-central-services
    consolePlugin:
      enabled: true

acsServices:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: false
    consolePlugin:
      enabled: true

# ─── Vault Central ───────────────────────────────────────────────────────────
vault:
  enabled: true
  chartVersion: "0.5.0"
  syncWave: "15"
  values:
    pushSecretToVault: true
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-central.apps.shc-central.lab.signal9.gg
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── Vault Services ─────────────────────────────────────────────────────────
vaultServices:
  enabled: false
  chartVersion: "0.5.0"
  syncWave: "15"
  values:
    pushSecretToVault: false
    vault:
      global:
        openshift: true
        imagePullSecrets:
          - name: quay-pull-secret
      server:
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            config: |
              ui = true
              listener "tcp" {
                tls_disable = 1
                address = "[::]:8200"
                cluster_address = "[::]:8201"
              }
              storage "raft" {
                path = "/vault/data"
              }
              service_registration "kubernetes" {}
        dataStorage:
          enabled: true
          size: 10Gi
        route:
          enabled: true
          host: vault-services.apps.shcservices.lab.signal9.gg
          tls:
            termination: edge
            insecureEdgeTerminationPolicy: Redirect
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── RHACM ───────────────────────────────────────────────────────────────────
rhacm:
  enabled: false
  chartVersion: "0.5.0"
  enableMultiClusterHub: false
  destinationNamespace: open-cluster-management
  syncWave: "10"
  values:
    operator:
      channel: release-2.16
      installPlanApproval: Automatic
    multiClusterHub:
      enabled: false
      availabilityConfig: High
      disableHubSelfManagement: false
      components:
        console: true
        search: true
        cluster-lifecycle: true
        volsync: false
        cluster-backup: false

# ─── AAP (services cluster) ─────────────────────────────────────────────────
aap:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "30"
  destinationNamespace: aap
  values:
    namespace: aap
    instance:
      enabled: true
      name: sovereign-aap
    controller:
      enabled: true
    eda:
      enabled: true
    hub:
      enabled: true
    postgres:
      enabled: true
      name: aap-pgcluster
      instances: 1
      storage: 10Gi

# ─── ODF / Noobaa (central) ─────────────────────────────────────────────────
odf:
  enabled: false
  chartVersion: "0.5.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── ODF / Noobaa (services) ────────────────────────────────────────────────
odfServices:
  enabled: false
  chartVersion: "0.5.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── Quay (central) ─────────────────────────────────────────────────────────
quay:
  enabled: false
  chartVersion: "0.5.1"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namespace: quay-enterprise
    registry:
      enabled: true
      name: sovereign-registry

# ─── Quay (services) ────────────────────────────────────────────────────────
quayServices:
  enabled: false
  chartVersion: "0.5.1"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namePrefix: "svc-"
    skipNamespace: true
    namespace: quay-enterprise
    registry:
      enabled: true
      name: svc-sovereign-registry
      components:
        objectstorage:
          managed: true
        postgres:
          managed: true
        clair:
          managed: true
        redis:
          managed: true
        mirror:
          managed: true
        monitoring:
          managed: false

# ─── Gitea (central only) ───────────────────────────────────────────────────
gitea:
  enabled: false
  chartVersion: "0.3.0"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      image:
        registry: quay.signal9.gg
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        config:
          server:
            DOMAIN: ""
            ROOT_URL: ""
          database:
            DB_TYPE: postgres
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/postgresql
          tag: "17.6.0-debian-12-r4"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true

# ─── Crunchy Postgres (central) ─────────────────────────────────────────────
crunchyPostgres:
  enabled: true
  chartVersion: "0.4.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namespace: openshift-operators

# ─── Crunchy Postgres (services) ────────────────────────────────────────────
crunchyPostgresServices:
  enabled: true
  chartVersion: "0.4.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namePrefix: "svc-"
    namespace: openshift-operators

# ─── External Secrets Operator (central) ────────────────────────────────────
externalSecrets:
  enabled: true
  chartVersion: "0.1.2"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── External Secrets Operator (services) ───────────────────────────────────
externalSecretsServices:
  enabled: true
  chartVersion: "0.1.2"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── Vault ClusterSecretStore (central) ─────────────────────────────────────
vaultSecretStore:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "22"
  values:
    vault:
      server: "http://vault-active.vault.svc:8200"
      path: "central"
      tokenSecretName: "vault-init-secrets"
      tokenSecretNamespace: "vault"
      tokenSecretKey: "root_token"

# ─── Vault ClusterSecretStore (services → vault-central via external route) ─
vaultSecretStoreServices:
  enabled: false
  chartVersion: "0.2.0"
  syncWave: "22"
  values:
    vault:
      server: "https://vault-central.apps.shc-central.lab.signal9.gg"
      path: "central"
      tokenSecretName: "vault-central-token"
      tokenSecretNamespace: "vault"
      tokenSecretKey: "root_token"

# ─── Sovereign Jobs RBAC ────────────────────────────────────────────────────
sovereignJobsRbac:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "3"
  values:
    namespace: sovereign-cloud-jobs
    serviceAccount: sovereign-ansible-runner
    imagePullSecrets:
      - name: quay-pull-secret

# ─── Sovereign Jobs (individual Ansible job Applications) ────────────────────
sovereignJobs:
  chartVersion: "0.1.0"
  namespace: sovereign-cloud-jobs
  serviceAccount: sovereign-ansible-runner
  image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
  backoffLimit: 5
  imagePullSecrets:
    - name: quay-pull-secret
  jobs:
    vaultInit:
      enabled: true
      playbook: vault-init.yml
      activeDeadlineSeconds: 600
      syncWave: "23"
      env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc:8200"
    vaultKv:
      enabled: true
      playbook: vault-kv.yml
      activeDeadlineSeconds: 600
      syncWave: "24"
      env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc:8200"
    deliverVaultToken:
      enabled: true
      playbook: deliver-vault-token.yml
      activeDeadlineSeconds: 300
      syncWave: "25"
      env:
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
        - name: TARGET_NAMESPACE
          value: "vault"
        - name: TARGET_SECRET_NAME
          value: "vault-central-token"
    keycloakRealms:
      enabled: false
      playbook: keycloak-realms.yml
      activeDeadlineSeconds: 600
      syncWave: "26"
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
    keycloakGroups:
      enabled: false
      playbook: keycloak-groups.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
    keycloakClients:
      enabled: false
      playbook: keycloak-clients.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: KEYCLOAK_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
        - name: KEYCLOAK_CLIENTS
          value: '[{"realm":"sovereign-central","client_id":"quay-central","name":"Quay Central","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"vault","name":"Vault","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"gitea","name":"Gitea","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"openshift-central","name":"OpenShift Central","redirect_uris":["*"]}]'
    keycloakRbac:
      enabled: false
      playbook: keycloak-rbac.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
    keycloakOauth:
      enabled: false
      playbook: keycloak-oauth.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      env:
        - name: KEYCLOAK_CENTRAL_URL
          value: "http://rhbk-central-service.rhbk.svc:8080"
        - name: KEYCLOAK_SERVICES_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-central-initial-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "rhbk"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET
          value: "rhbk-services-initial-admin"
        - name: KEYCLOAK_SERVICES_ADMIN_SECRET_NS
          value: "rhbk"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
    giteaInit:
      enabled: false
      playbook: gitea-init.yml
      activeDeadlineSeconds: 600
      syncWave: "27"
      pushSecrets:
        pushGiteaAdmin:
          enabled: true
          secretName: gitea-credentials
          data:
            - secretKey: admin_user
              remoteKey: central/data/gitea-admin
              property: admin_user
            - secretKey: admin_password
              remoteKey: central/data/gitea-admin
              property: admin_password
            - secretKey: admin_token
              remoteKey: central/data/gitea-admin
              property: admin_token
      env:
        - name: GITEA_URL
          value: "http://gitea-http.gitea.svc:3000"
    keycloakServicesRealms:
      enabled: false
      playbook: keycloak-realms.yml
      activeDeadlineSeconds: 600
      syncWave: "28"
      externalSecrets:
        rhbkServicesAdmin:
          enabled: true
          targetSecretName: rhbk-services-admin
          data:
            - secretKey: username
              remoteKey: rhbk-services-admin
              property: username
            - secretKey: password
              remoteKey: rhbk-services-admin
              property: password
      env:
        - name: KEYCLOAK_URL
          value: "https://rhbk-services.apps.shcservices.lab.signal9.gg"
        - name: KEYCLOAK_ADMIN_SECRET
          value: "rhbk-services-admin"
        - name: KEYCLOAK_ADMIN_SECRET_NS
          value: "sovereign-cloud-jobs"
        - name: REALM_NAME
          value: "sovereign-tenants"
    vaultServicesInit:
      enabled: false
      playbook: vault-services-init.yml
      activeDeadlineSeconds: 600
      syncWave: "29"
      env:
        - name: VAULT_ADDR
          value: "https://vault-services.apps.shcservices.lab.signal9.gg"
        - name: OCP_SERVICES_SERVER
          value: "https://api.shcservices.lab.signal9.gg:6443"
        - name: VAULT_SECRET_NAME
          value: "vault-services-init-secrets"
        - name: VAULT_SECRET_NAMESPACE
          value: "sovereign-cloud-jobs"

# ─── Plugin RBAC Operator (services cluster) ────────────────────────────────
pluginRbac:
  enabled: false
  chartVersion: "0.1.0"
  syncWave: "39"
  destinationNamespace: sovereign-cloud-plugins
  values:
    namespace: sovereign-cloud-plugins
    image:
      repository: quay.signal9.gg/hybrid-sovereign/plugin-rbac
      tag: "0.0.1"
      pullPolicy: Always
    imagePullSecrets:
      - name: quay-pull-secret

# ─── Entity Operator (services cluster) ─────────────────────────────────────
entityOperator:
  enabled: false
  chartVersion: "0.6.0"
  syncWave: "38"
  destinationNamespace: sovereign-cloud
  values:
    namespace: sovereign-cloud
    image:
      repository: quay.signal9.gg/hybrid-sovereign/entity-operator
      tag: "0.0.3"
      pullPolicy: Always
    imagePullSecrets:
      - name: quay-pull-secret

# ─── Sovereign Cloud Dashboard (services cluster) ──────────────────────────
sovereignDashboard:
  enabled: false
  chartVersion: "0.3.0"
  syncWave: "40"
  destinationNamespace: sovereign-cloud
  values:
    namespace: sovereign-cloud
    clusterDomain: apps.shcservices.lab.signal9.gg
    image:
      repository: quay.signal9.gg/hybrid-sovereign/sovereign-cloud-dashboard
      tag: "1.2.0"
      pullPolicy: Always
    imagePullSecrets:
      - name: quay-pull-secret
    oauthProxy:
      image: registry.redhat.io/openshift4/ose-oauth-proxy:v4.14
      cookieSecret: "1RYh2dMWh0FoJZIfW8LqIWojyDPN6vPD"
    route:
      enabled: true
    env:
      ENTITY_NAMESPACE: sovereign-cloud
      NODE_ENV: production

# ─── ArgoCD namespace ─────────────────────────────────────────────────────────
argocd:
  namespace: openshift-gitops

# ─── Services cluster (managed by central ArgoCD) ────────────────────────────
servicesCluster:
  server: "https://api.shcservices.lab.signal9.gg:6443"

# ─── OCI registry that stores platform Helm charts ───────────────────────────
oci:
  # Registry hostname — must match the value used in make upload-acm-chart.
  registry: "quay.signal9.gg"
  # OCI repository path prefix (without the chart name).
  # Charts are stored at oci://<registry>/<repositoryBase>/<chartName>
  repositoryBase: "hybrid-sovereign"

# ─── Sovereign Namespaces ────────────────────────────────────────────────────
sovereignNamespaces:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud
        enabled: true
      - name: sovereign-cloud-plugins
        enabled: true
      - name: sovereign-cloud-jobs
        enabled: true

# ─── Sovereign Namespaces (services cluster) ────────────────────────────────
# Disabled: services namespaces are created by CreateNamespace=true in RHBK app.
# ArgoCD has a known limitation with same-named cluster-scoped resources across clusters.
sovereignNamespacesServices:
  enabled: false
  chartVersion: "0.1.0"
  syncWave: "1"
  values:
    namespaces:
      - name: sovereign-cloud
        enabled: true
      - name: sovereign-cloud-plugins
        enabled: true

# ─── RHBK (Keycloak) ─────────────────────────────────────────────────────────
rhbk:
  enabled: true
  chartVersion: "0.8.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: sovereign-keycloak-central
    pushSecretToVault: true
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 2
      hostname: ""
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK (Keycloak) — services cluster ─────────────────────────────────────
rhbkServices:
  enabled: true
  chartVersion: "0.8.0"
  syncWave: "20"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    instanceName: sovereign-keycloak-services
    operator:
      channel: stable-v26.4
    keycloak:
      enabled: true
      instances: 2
      hostname: ""
      db:
        enabled: false
      tls:
        enabled: false

# ─── RHBK Config (DEPRECATED — replaced by individual ansible jobs) ──────────
rhbkConfig:
  enabled: false
  chartVersion: "0.4.0"
  syncWave: "30"
  destinationNamespace: rhbk
  values:
    namespace: rhbk
    ansibleJob:
      enabled: false

# ─── ACS (Advanced Cluster Security) ────────────────────────────────────────
acs:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: true
      namespace: stackrox
      instanceName: stackrox-central-services
    consolePlugin:
      enabled: true

# ─── ACS — services cluster ────────────────────────────────────────────────
acsServices:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "25"
  destinationNamespace: rhacs-operator
  values:
    namespace: rhacs-operator
    central:
      enabled: false
    consolePlugin:
      enabled: true

# ─── Vault (central cluster only) ──────────────────────────────────────────
vault:
  enabled: true
  chartVersion: "0.4.0"
  syncWave: "15"
  values:
    vault:
      global:
        openshift: true
      server:
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
        route:
          enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault
          tag: "1.21.2"
      ui:
        enabled: true
      injector:
        enabled: true
        image:
          repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
          tag: "1.5.0"

# ─── RHACM Application ───────────────────────────────────────────────────────
rhacm:
  # Set to false to skip deploying RHACM via ArgoCD.
  enabled: true
  # Chart version to deploy — must match the version pushed by make upload-acm-chart.
  chartVersion: "0.5.0"
  # Set to false before ACM operator installs (CRD won't exist yet).
  # Set to true after operator is running.
  enableMultiClusterHub: true
  # Namespace on the central cluster where RHACM is installed.
  destinationNamespace: open-cluster-management
  # Sync wave — RHACM runs early so other platform components can register.
  syncWave: "10"
  # Pass-through values for the rhacm chart.
  # These override defaults in bootstrap/helm/charts/rhacm/values.yaml.
  values:
    operator:
      channel: release-2.16
      installPlanApproval: Automatic
    multiClusterHub:
      enabled: true
      availabilityConfig: High
      disableHubSelfManagement: false
      components:
        console: true
        search: true
        cluster-lifecycle: true
        volsync: false
        cluster-backup: false

# ─── AAP (services cluster only) ──────────────────────────────────────────
aap:
  enabled: true
  chartVersion: "0.3.0"
  syncWave: "30"
  destinationNamespace: aap
  values:
    namespace: aap
    instance:
      enabled: true
      name: sovereign-aap
    controller:
      enabled: true
    eda:
      enabled: true
    hub:
      enabled: true

# ─── ODF / Noobaa (central cluster) ──────────────────────────────────────
odf:
  enabled: true
  chartVersion: "0.3.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── ODF / Noobaa (services cluster) ──────────────────────────────────────
odfServices:
  enabled: true
  chartVersion: "0.3.0"
  syncWave: "12"
  destinationNamespace: openshift-storage
  values:
    namespace: openshift-storage
    noobaa:
      enabled: true
      name: noobaa

# ─── Quay (central cluster) ──────────────────────────────────────────────
quay:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namespace: quay-enterprise
    registry:
      enabled: true
      name: sovereign-registry

# ─── Quay (services cluster) ──────────────────────────────────────────────
quayServices:
  enabled: true
  chartVersion: "0.2.0"
  syncWave: "35"
  destinationNamespace: quay-enterprise
  values:
    namespace: quay-enterprise
    registry:
      enabled: true
      name: sovereign-registry

# ─── Gitea (central cluster only) ─────────────────────────────────────────
gitea:
  enabled: true
  chartVersion: "0.3.0"
  syncWave: "18"
  values:
    gitea:
      global:
        security:
          allowInsecureImages: true
        imagePullSecrets:
          - quay-pull-secret
      replicaCount: 1
      image:
        registry: quay.signal9.gg
        repository: hybrid-sovereign/gitea
        tag: "1.25.5"
        rootless: true
      gitea:
        config:
          server:
            DOMAIN: ""
            ROOT_URL: ""
          database:
            DB_TYPE: postgres
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      postgresql:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/postgresql
          tag: "17.6.0-debian-12-r4"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
      postgresql-ha:
        enabled: false
      redis:
        enabled: false
      redis-cluster:
        enabled: false
      valkey-cluster:
        enabled: true
        image:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/valkey-cluster
          tag: "8.1.3-debian-12-r3"
        volumePermissions:
          image:
            registry: quay.signal9.gg
            repository: hybrid-sovereign/os-shell
            tag: "12-debian-12-r51"
        sysctlImage:
          registry: quay.signal9.gg
          repository: hybrid-sovereign/os-shell
          tag: "12-debian-12-r51"
      persistence:
        enabled: true
        size: 10Gi
      route:
        enabled: true

# ─── CrunchyData Postgres (central cluster) ──────────────────────────────
crunchyPostgres:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namespace: openshift-operators

# ─── CrunchyData Postgres (services cluster) ──────────────────────────────
crunchyPostgresServices:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "11"
  destinationNamespace: openshift-operators
  values:
    namespace: openshift-operators

# ─── External Secrets Operator ───────────────────────────────────────────
externalSecrets:
  enabled: true
  chartVersion: "0.1.1"
  syncWave: "5"
  values:
    operator:
      channel: stable
      installPlanApproval: Automatic
      source: community-operators
      sourceNamespace: openshift-marketplace
    namespace: external-secrets

# ─── Vault ClusterSecretStore ────────────────────────────────────────────
vaultSecretStore:
  enabled: true
  chartVersion: "0.1.0"
  syncWave: "22"
  values:
    vault:
      server: "http://vault.vault.svc:8200"
      path: "central"
      tokenSecretName: "vault-init-secrets"
      tokenSecretNamespace: "vault"
      tokenSecretKey: "root_token"

# ─── Ansible Jobs (1 per role) ───────────────────────────────────────────
jobs:
  chartVersion: "0.1.2"

  vaultInit:
    enabled: true
    syncWave: "20"
    values:
      namespace: sovereign-jobs
      rbac:
        create: true
      job:
        name: vault-init
        playbook: vault-init.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 600
        syncWave: "5"
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc:8200"
        imagePullSecrets:
          - name: quay-pull-secret

  vaultKv:
    enabled: true
    syncWave: "21"
    values:
      namespace: sovereign-jobs
      job:
        name: vault-kv
        playbook: vault-kv.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 300
        syncWave: "5"
        env:
          - name: VAULT_ADDR
            value: "http://vault.vault.svc:8200"
        imagePullSecrets:
          - name: quay-pull-secret

  keycloakRealms:
    enabled: true
    syncWave: "40"
    values:
      namespace: sovereign-jobs
      externalSecrets:
        - name: keycloak-admin-creds
          keys:
            - secretKey: username
              remoteKey: central/data/keycloak-admin
              property: username
            - secretKey: password
              remoteKey: central/data/keycloak-admin
              property: password
      job:
        name: keycloak-realms
        playbook: keycloak-realms.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 300
        syncWave: "5"
        env:
          - name: KEYCLOAK_URL
            value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
          - name: KEYCLOAK_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: username
          - name: KEYCLOAK_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: password
        imagePullSecrets:
          - name: quay-pull-secret

  keycloakGroups:
    enabled: true
    syncWave: "41"
    values:
      namespace: sovereign-jobs
      externalSecrets:
        - name: keycloak-admin-creds
          keys:
            - secretKey: username
              remoteKey: central/data/keycloak-admin
              property: username
            - secretKey: password
              remoteKey: central/data/keycloak-admin
              property: password
      job:
        name: keycloak-groups
        playbook: keycloak-groups.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 300
        syncWave: "5"
        env:
          - name: KEYCLOAK_URL
            value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
          - name: KEYCLOAK_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: username
          - name: KEYCLOAK_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: password
        imagePullSecrets:
          - name: quay-pull-secret

  keycloakClients:
    enabled: true
    syncWave: "42"
    values:
      namespace: sovereign-jobs
      externalSecrets:
        - name: keycloak-admin-creds
          keys:
            - secretKey: username
              remoteKey: central/data/keycloak-admin
              property: username
            - secretKey: password
              remoteKey: central/data/keycloak-admin
              property: password
      pushSecrets:
        - name: push-keycloak-client-secrets
          sourceSecret: keycloak-client-secrets
          keys:
            - secretKey: quay-central
              remoteKey: central/data/keycloak-clients
              property: quay-central
            - secretKey: vault
              remoteKey: central/data/keycloak-clients
              property: vault
            - secretKey: gitea
              remoteKey: central/data/keycloak-clients
              property: gitea
            - secretKey: openshift-central
              remoteKey: central/data/keycloak-clients
              property: openshift-central
      job:
        name: keycloak-clients
        playbook: keycloak-clients.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 600
        syncWave: "5"
        env:
          - name: KEYCLOAK_URL
            value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
          - name: KEYCLOAK_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: username
          - name: KEYCLOAK_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: password
          - name: KEYCLOAK_CLIENTS
            value: '[{"realm":"sovereign-central","client_id":"quay-central","name":"Quay Central","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"vault","name":"HashiCorp Vault","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"gitea","name":"Gitea","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"openshift-central","name":"OpenShift Central","redirect_uris":["*"]}]'
        imagePullSecrets:
          - name: quay-pull-secret

  keycloakRbac:
    enabled: true
    syncWave: "43"
    values:
      namespace: sovereign-jobs
      job:
        name: keycloak-rbac
        playbook: keycloak-rbac.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 300
        syncWave: "5"
        env:
          - name: OCP_SERVICES_SERVER
            value: "https://api.shcservices.lab.signal9.gg:6443"
        imagePullSecrets:
          - name: quay-pull-secret

  keycloakOauth:
    enabled: true
    syncWave: "44"
    values:
      namespace: sovereign-jobs
      externalSecrets:
        - name: keycloak-admin-creds
          keys:
            - secretKey: username
              remoteKey: central/data/keycloak-admin
              property: username
            - secretKey: password
              remoteKey: central/data/keycloak-admin
              property: password
      job:
        name: keycloak-oauth
        playbook: keycloak-oauth.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 600
        syncWave: "5"
        env:
          - name: KEYCLOAK_CENTRAL_URL
            value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
          - name: KEYCLOAK_SERVICES_URL
            value: "http://sovereign-keycloak-services-service.rhbk.svc:8080"
          - name: KEYCLOAK_ADMIN_USER
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: username
          - name: KEYCLOAK_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: keycloak-admin-creds
                key: password
          - name: OCP_SERVICES_SERVER
            value: "https://api.shcservices.lab.signal9.gg:6443"
        imagePullSecrets:
          - name: quay-pull-secret

  giteaInit:
    enabled: true
    syncWave: "45"
    values:
      namespace: sovereign-jobs
      job:
        name: gitea-init
        playbook: gitea-init.yml
        image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
        serviceAccount: sovereign-ansible-runner
        backoffLimit: 5
        activeDeadlineSeconds: 300
        syncWave: "5"
        env:
          - name: GITEA_URL
            value: "http://gitea-http.gitea.svc:3000"
        imagePullSecrets:
          - name: quay-pull-secret

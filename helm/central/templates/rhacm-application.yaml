{{- if .Values.rhacm.enabled }}
---
# ArgoCD Application that installs RHACM from the OCI Helm chart pushed by
# `make upload-acm-chart`.  Source type is "helm" with repoURL pointing to the
# OCI registry so ArgoCD pulls the chart without needing a Git clone.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhacm
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: rhacm
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rhacm.syncWave | quote }}
spec:
  project: default

  source:
    repoURL: {{ include "sovereign-central.ociURL" . | quote }}
    chart: rhacm
    targetRevision: {{ .Values.rhacm.chartVersion | quote }}
    helm:
      releaseName: rhacm
      {{- with .Values.rhacm.values }}
      values: |
        {{- toYaml . | nindent 8 }}
      {{- end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.rhacm.destinationNamespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}

{{- if .Values.sovereignJobs.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sovereign-jobs
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: ansible-jobs
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.sovereignJobs.syncWave | quote }}
spec:
  project: default

  source:
    repoURL: {{ printf "oci://%s/%s/sovereign-jobs" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: sovereign-jobs
    targetRevision: {{ .Values.sovereignJobs.chartVersion | quote }}
    helm:
      releaseName: sovereign-jobs
      values: |
        {{- toYaml .Values.sovereignJobs.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: sovereign-jobs

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 60s
        factor: 2
        maxDuration: 15m
{{- end }}

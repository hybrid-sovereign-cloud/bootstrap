{{- if .Values.externalSecrets.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.externalSecrets.syncWave | quote }}
spec:
  project: central

  source:
    repoURL: {{ printf "oci://%s/%s/external-secrets" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: external-secrets
    targetRevision: {{ .Values.externalSecrets.chartVersion | quote }}
    helm:
      releaseName: external-secrets
      values: |
        {{- toYaml .Values.externalSecrets.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}

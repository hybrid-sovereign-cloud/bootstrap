{{- if .Values.clusterBuilds.enabled }}
---
# ApplicationSet: spoke-cluster-apps
#
# Discovers spoke cluster Application definitions from builds/aws/<name>/apps/*.yaml
# and deploys them to the spoke cluster's ArgoCD (via the hub cluster).
# Each spoke app file follows the schema:
#   app:
#     name: <string>         # ArgoCD Application name
#     chart: <string>        # chart path in charts repo
#     chartsTargetRevision: <string>  # charts repo branch/tag
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: spoke-cluster-apps
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterBuilds.syncWave | default "50" | quote }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=zero
  generators:
    - git:
        repoURL: {{ .Values.clusterBuilds.repoURL | quote }}
        revision: HEAD
        files:
          - path: "builds/aws/*/apps/*.yaml"
  template:
    metadata:
      name: "{{ "{{" }}.app.name{{ "}}" }}"
      namespace: {{ .Values.argocd.namespace }}
      labels:
        app.kubernetes.io/part-of: hybrid-sovereign-cloud
        app.kubernetes.io/managed-by: spoke-cluster-apps-appset
        spoke-app: "true"
    spec:
      project: cluster-builds
      sources:
        - repoURL: {{ .Values.clusterBuilds.chartsRepoURL | quote }}
          path: "{{ "{{" }}.app.chart{{ "}}" }}"
          targetRevision: "{{ "{{" }}.app.chartsTargetRevision{{ "}}" }}"
          helm:
            releaseName: "{{ "{{" }}.app.name{{ "}}" }}"
        - repoURL: {{ .Values.clusterBuilds.repoURL | quote }}
          ref: values
          targetRevision: HEAD
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m
{{- end }}

{{- if .Values.clusterBuilds.enabled }}
---
# ApplicationSet: cluster-builds
#
# Monitors cluster_builds repo for simple Application definitions in aws/*.yaml.
# Schema:
#   app:
#     name: <string>
#     source:
#       repoURL: <string>
#       path: <string>
#       targetRevision: <string>
#     destination:
#       server: <string>
#       namespace: <string>
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-builds
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterBuilds.syncWave | default "50" | quote }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=zero
  generators:
    - git:
        repoURL: {{ .Values.clusterBuilds.repoURL | quote }}
        revision: HEAD
        files:
          - path: "aws/*.yaml"
  template:
    metadata:
      name: "{{ "{{" }}.app.name{{ "}}" }}"
      namespace: {{ .Values.argocd.namespace }}
      labels:
        app.kubernetes.io/part-of: hybrid-sovereign-cloud
        app.kubernetes.io/managed-by: cluster-builds-appset
    spec:
      project: cluster-builds
      source:
        repoURL: "{{ "{{" }}.app.source.repoURL{{ "}}" }}"
        path: "{{ "{{" }}.app.source.path{{ "}}" }}"
        targetRevision: "{{ "{{" }}.app.source.targetRevision{{ "}}" }}"
      destination:
        server: "{{ "{{" }}.app.destination.server{{ "}}" }}"
        namespace: "{{ "{{" }}.app.destination.namespace{{ "}}" }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m
---
# ApplicationSet: cluster-builds-clusters
#
# Multi-source ApplicationSet for Hive/MCE cluster deployments.
# Chart is sourced from the sovereign charts repo; values from cluster_builds.
# The operator writes aws/clusters/<slug>.yaml and buildValues/<slug>-build-values.yaml.
#
# Schema (aws/clusters/<name>.yaml):
#   app:
#     name: <string>                          # ArgoCD Application name, e.g. ocp-qwert
#     chartsTargetRevision: <string>          # charts repo branch/tag, default: main
#
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-builds-clusters
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.clusterBuilds.syncWave | default "50" | quote }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=zero
  generators:
    - git:
        repoURL: {{ .Values.clusterBuilds.repoURL | quote }}
        revision: HEAD
        files:
          - path: "aws/clusters/*.yaml"
  template:
    metadata:
      name: "{{ "{{" }}.app.name{{ "}}" }}"
      namespace: {{ .Values.argocd.namespace }}
      labels:
        app.kubernetes.io/part-of: hybrid-sovereign-cloud
        app.kubernetes.io/managed-by: cluster-builds-clusters-appset
        cluster-build: "true"
    spec:
      project: cluster-builds
      sources:
        - repoURL: {{ .Values.clusterBuilds.chartsRepoURL | quote }}
          path: {{ .Values.clusterBuilds.mceClusterBuildPath | quote }}
          targetRevision: "{{ "{{" }}.app.chartsTargetRevision{{ "}}" }}"
          helm:
            releaseName: "{{ "{{" }}.app.name{{ "}}" }}"
            valueFiles:
              - "$values/buildValues/{{ "{{" }}.app.name{{ "}}" }}-build-values.yaml"
        - repoURL: {{ .Values.clusterBuilds.repoURL | quote }}
          ref: values
          targetRevision: HEAD
      destination:
        server: https://kubernetes.default.svc
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - SkipDryRunOnMissingResource=true
        retry:
          limit: 10
          backoff:
            duration: 30s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
        - group: hive.openshift.io
          kind: ClusterDeployment
          jsonPointers:
            - /spec/installed
{{- end }}

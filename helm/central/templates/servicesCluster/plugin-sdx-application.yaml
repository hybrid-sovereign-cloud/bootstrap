{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.pluginSdx.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plugin-sdx
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: sdx
    sovereign-cloud/target: services
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.pluginSdx.syncWave | quote }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/plugin-sdx" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: plugin-sdx
    targetRevision: {{ .Values.pluginSdx.chartVersion | quote }}
    helm:
      releaseName: plugin-sdx
      values: |
        image:
          repository: {{ .Values.pluginSdx.image.repository }}
          tag: {{ .Values.pluginSdx.image.tag | quote }}
        {{- if .Values.pluginSdx.values }}
        {{- toYaml .Values.pluginSdx.values | nindent 8 }}
        {{- end }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: sovereign-cloud-plugins

  ignoreDifferences:
    {{- include "sovereign-central.esoIgnoreDifferences" . | nindent 4 }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}

{{- if .Values.vault.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.vault.syncWave | quote }}
spec:
  project: default

  source:
    repoURL: {{ printf "oci://%s/%s/vault" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: vault
    targetRevision: {{ .Values.vault.chartVersion | quote }}
    helm:
      releaseName: vault
      values: |
        {{- toYaml .Values.vault.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  ignoreDifferences:
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /spec/host

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}

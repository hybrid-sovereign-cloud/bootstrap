{{- if .Values.gitea.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: git
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.gitea.syncWave | quote }}
spec:
  project: default

  source:
    repoURL: {{ printf "oci://%s/%s/gitea" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: gitea
    targetRevision: {{ .Values.gitea.chartVersion | quote }}
    helm:
      releaseName: gitea
      values: |
        {{- toYaml .Values.gitea.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: gitea

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}

{{- if and (include "sovereign-central.applicationsEnabled" .) .Values.helperCloudOSO.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helper-cloudoso
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: helpers
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.helperCloudOSO.syncWave | quote }}
spec:
  project: central

  source:
    repoURL: {{ printf "oci://%s/%s/helper-cloudoso" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: helper-cloudoso
    targetRevision: {{ .Values.helperCloudOSO.chartVersion | quote }}
    helm:
      releaseName: helper-cloudoso
      values: |
        {{- toYaml .Values.helperCloudOSO.values | nindent 8 }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.helperCloudOSO.destinationNamespace | default "sovereign-cloud-helpers" }}

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/imagePullSecrets
    {{- include "sovereign-central.esoIgnoreDifferences" . | nindent 4 }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 10
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
{{- end }}

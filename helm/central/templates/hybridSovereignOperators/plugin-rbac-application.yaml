{{- if .Values.pluginRbac.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plugin-rbac
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.pluginRbac.syncWave | quote }}
spec:
  project: services

  source:
    repoURL: {{ printf "oci://%s/%s/plugin-rbac" .Values.oci.registry .Values.oci.repositoryBase | quote }}
    chart: plugin-rbac
    targetRevision: {{ .Values.pluginRbac.chartVersion | quote }}
    helm:
      releaseName: plugin-rbac
      values: |
        {{- toYaml .Values.pluginRbac.values | nindent 8 }}

  destination:
    server: {{ .Values.servicesCluster.server | quote }}
    namespace: {{ .Values.pluginRbac.destinationNamespace }}

  ignoreDifferences:
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /imagePullSecrets
        - /secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - Validate=false
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}

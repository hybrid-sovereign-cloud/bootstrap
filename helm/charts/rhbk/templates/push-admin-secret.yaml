{{- if .Values.pushSecretToVault }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-keycloak-admin-{{ .Values.instanceName }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  deletionPolicy: None
  refreshInterval: "1h"
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ .Values.instanceName }}-initial-admin
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: {{ .Values.vaultSecretPath | default "central/data/keycloak-admin" }}
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: {{ .Values.vaultSecretPath | default "central/data/keycloak-admin" }}
          property: password
  updatePolicy: Replace
{{- end }}

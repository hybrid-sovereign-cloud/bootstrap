operator:
  channel: stable-v26.4
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  name: rhbk-operator

namespace: rhbk

instanceName: sovereign-keycloak

keycloak:
  enabled: true
  instances: 2
  hostname: ""
  database:
    vendor: postgres
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
    host: ""
    database: keycloak


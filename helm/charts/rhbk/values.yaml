operator:
  channel: stable-v26.4
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  name: rhbk-operator

namespace: rhbk

instanceName: sovereign-keycloak

pushSecretToVault: false

keycloak:
  enabled: true
  instances: 2
  hostname: ""
  db:
    enabled: false
    vendor: postgres
    host: ""
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: username
    passwordSecret:
      name: keycloak-db-secret
      key: password
  tls:
    enabled: false
    secretName: keycloak-tls-secret

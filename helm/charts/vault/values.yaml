pushSecretToVault: false

vault:
  global:
    openshift: true
  server:
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path = "/vault/data"
          }
          service_registration "kubernetes" {}
    dataStorage:
      enabled: true
      size: 10Gi
    route:
      enabled: true
      host: ""
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    image:
      repository: quay.signal9.gg/hybrid-sovereign/vault
      tag: "1.21.2"
  ui:
    enabled: true
  injector:
    enabled: true
    image:
      repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
      tag: "1.5.0"

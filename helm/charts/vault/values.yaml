pushSecretToVault: false

# ─── OCI pull secret via ExternalSecret (for services cluster vault namespace) ─
ociCredentials:
  enabled: false
  vaultPath: "central/data/oci-credentials"
  secretStoreName: "vault-backend"
  secretStoreKind: "ClusterSecretStore"

# ─── In-cluster vault init Job ────────────────────────────────────────────────
vaultInit:
  enabled: false
  image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
  imagePullSecretName: "quay-pull-secret"
  serviceAccount: "vault-init-runner"
  namespace: "vault"
  secretName: "vault-services-init-secrets"
  vaultAddr: "http://vault-services.vault.svc:8200"
  vaultNamespace: "vault"
  activeDeadlineSeconds: 600
  backoffLimit: 5
  syncWave: "18"
  pushSecretToVaultCentral: false
  pushSecretStoreName: "vault-backend"
  vaultCentralPath: "central/data/vault-services-init"

vault:
  global:
    openshift: true
  server:
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        config: |
          ui = true
          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }
          storage "raft" {
            path = "/vault/data"
          }
          service_registration "kubernetes" {}
    dataStorage:
      enabled: true
      size: 10Gi
    route:
      enabled: true
      host: ""
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
    image:
      repository: quay.signal9.gg/hybrid-sovereign/vault
      tag: "1.21.2"
  ui:
    enabled: true
  injector:
    enabled: true
    image:
      repository: quay.signal9.gg/hybrid-sovereign/vault-k8s
      tag: "1.5.0"

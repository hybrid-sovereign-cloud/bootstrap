{{- if .Values.vaultInit.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-services-init
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.vaultInit.syncWave | quote }}
spec:
  backoffLimit: {{ .Values.vaultInit.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.vaultInit.activeDeadlineSeconds }}
  template:
    spec:
      serviceAccountName: {{ .Values.vaultInit.serviceAccount }}
      restartPolicy: OnFailure
      {{- if .Values.vaultInit.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.vaultInit.imagePullSecretName }}
      {{- end }}
      containers:
        - name: vault-init
          image: {{ .Values.vaultInit.image | quote }}
          imagePullPolicy: Always
          command:
            - ansible-runner
            - run
            - /runner
            - -p
            - vault-services-init-local.yml
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vaultInit.vaultAddr | quote }}
            - name: VAULT_NAMESPACE
              value: {{ .Values.vaultInit.vaultNamespace | quote }}
            - name: VAULT_SECRET_NAME
              value: {{ .Values.vaultInit.secretName | quote }}
{{- end }}
{{- if .Values.vaultInit.pushSecretToVaultCentral }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-vault-services-init-secrets
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  deletionPolicy: None
  refreshInterval: 1h
  secretStoreRefs:
    - name: {{ .Values.vaultInit.pushSecretStoreName }}
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ .Values.vaultInit.secretName }}
  data:
    - match:
        secretKey: root_token
        remoteRef:
          remoteKey: {{ .Values.vaultInit.vaultCentralPath }}
          property: root_token
      conversionStrategy: None
    - match:
        secretKey: unseal_keys
        remoteRef:
          remoteKey: {{ .Values.vaultInit.vaultCentralPath }}
          property: unseal_keys
      conversionStrategy: None
    - match:
        secretKey: unseal_keys_base64
        remoteRef:
          remoteKey: {{ .Values.vaultInit.vaultCentralPath }}
          property: unseal_keys_base64
      conversionStrategy: None
  updatePolicy: Replace
{{- end }}

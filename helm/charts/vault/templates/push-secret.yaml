{{- if .Values.pushSecretToVault }}
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: push-vault-init-secrets
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  deletionPolicy: None
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: vault-init-secrets
  data:
    - match:
        secretKey: root_token
        remoteRef:
          remoteKey: vault-init
          property: root_token
    - match:
        secretKey: unseal_keys
        remoteRef:
          remoteKey: vault-init
          property: unseal_keys
    - match:
        secretKey: unseal_keys_base64
        remoteRef:
          remoteKey: vault-init
          property: unseal_keys_base64
  updatePolicy: Replace
{{- end }}

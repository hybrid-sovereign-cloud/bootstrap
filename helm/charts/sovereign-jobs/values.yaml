namespace: sovereign-jobs
serviceAccount: sovereign-ansible-runner
image: "quay.signal9.gg/hybrid-sovereign/ansible-runner:latest"
backoffLimit: 5

imagePullSecrets:
  - name: quay-pull-secret

jobs:
  vaultInit:
    enabled: true
    playbook: vault-init.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: VAULT_ADDR
        value: "http://vault-active.vault.svc:8200"

  vaultKv:
    enabled: true
    playbook: vault-kv.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: VAULT_ADDR
        value: "http://vault-active.vault.svc:8200"

  keycloakRealms:
    enabled: true
    playbook: keycloak-realms.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: KEYCLOAK_URL
        value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
      - name: KEYCLOAK_ADMIN_SECRET
        value: "sovereign-keycloak-central-initial-admin"
      - name: KEYCLOAK_ADMIN_SECRET_NS
        value: "rhbk"

  keycloakGroups:
    enabled: true
    playbook: keycloak-groups.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: KEYCLOAK_URL
        value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
      - name: KEYCLOAK_ADMIN_SECRET
        value: "sovereign-keycloak-central-initial-admin"
      - name: KEYCLOAK_ADMIN_SECRET_NS
        value: "rhbk"

  keycloakClients:
    enabled: true
    playbook: keycloak-clients.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: KEYCLOAK_URL
        value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
      - name: KEYCLOAK_ADMIN_SECRET
        value: "sovereign-keycloak-central-initial-admin"
      - name: KEYCLOAK_ADMIN_SECRET_NS
        value: "rhbk"
      - name: KEYCLOAK_CLIENTS
        value: '[{"realm":"sovereign-central","client_id":"quay-central","name":"Quay Central","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"vault","name":"Vault","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"gitea","name":"Gitea","redirect_uris":["*"]},{"realm":"sovereign-central","client_id":"openshift-central","name":"OpenShift Central","redirect_uris":["*"]}]'

  keycloakRbac:
    enabled: true
    playbook: keycloak-rbac.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: OCP_SERVICES_SERVER
        value: "https://api.shcservices.lab.signal9.gg:6443"

  keycloakOauth:
    enabled: true
    playbook: keycloak-oauth.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: KEYCLOAK_CENTRAL_URL
        value: "http://sovereign-keycloak-central-service.rhbk.svc:8080"
      - name: KEYCLOAK_SERVICES_URL
        value: "http://sovereign-keycloak-services-service.rhbk.svc:8080"
      - name: KEYCLOAK_ADMIN_SECRET
        value: "sovereign-keycloak-central-initial-admin"
      - name: KEYCLOAK_ADMIN_SECRET_NS
        value: "rhbk"
      - name: OCP_SERVICES_SERVER
        value: "https://api.shcservices.lab.signal9.gg:6443"

  giteaInit:
    enabled: true
    playbook: gitea-init.yml
    activeDeadlineSeconds: 600
    syncWave: "1"
    env:
      - name: GITEA_URL
        value: "http://gitea-http.gitea.svc:3000"

pushSecrets:
  pushGiteaAdmin:
    enabled: true
    secretName: gitea-credentials
    data:
      - secretKey: admin_user
        remoteKey: central/data/gitea-admin
        property: admin_user
      - secretKey: admin_password
        remoteKey: central/data/gitea-admin
        property: admin_password
      - secretKey: admin_token
        remoteKey: central/data/gitea-admin
        property: admin_token

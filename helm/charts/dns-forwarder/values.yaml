# DNS forwarder zones for the OpenShift DNS operator (operator.openshift.io/v1 DNS/default).
# Each entry is added as a server in spec.servers; more-specific zones win over broader ones.
servers:
  # Internal lab DNS — resolves private infrastructure (vCenter, ESXi, bare-metal hosts).
  # CoreDNS on worker nodes reads /etc/resolv.conf (which points to 172.18.42.10/11), so
  # nodes resolve lab.signal9.gg fine.  Pods do NOT — they use CoreDNS which without this
  # entry falls through to the public signal9.gg forwarder (8.8.8.8) and fails for private hosts.
  - name: lab-signal9-forwarder
    zones:
      - lab.signal9.gg
    policy: Sequential
    upstreams:
      - 172.18.42.10
      - 172.18.42.11

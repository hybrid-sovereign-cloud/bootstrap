apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-forwarder
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: event-forwarder
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: event-forwarder
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: event-forwarder
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      imagePullSecrets:
        - name: quay-pull-secret
      containers:
        - name: forwarder
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: EVENT_STREAM_URL
              value: {{ .Values.eventStream.url | quote }}
            - name: EVENT_STREAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.eventStream.tokenSecretName }}
                  key: {{ .Values.eventStream.tokenSecretKey }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

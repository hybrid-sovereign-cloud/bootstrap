{{- if .Values.registry.enabled }}
---
apiVersion: quay.redhat.com/v1
kind: QuayRegistry
metadata:
  name: {{ .Values.registry.name }}
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  components:
    - kind: objectstorage
      managed: {{ .Values.registry.components.objectstorage.managed }}
    - kind: postgres
      managed: {{ .Values.registry.components.postgres.managed }}
    - kind: clair
      managed: {{ .Values.registry.components.clair.managed }}
    - kind: redis
      managed: {{ .Values.registry.components.redis.managed }}
    - kind: mirror
      managed: {{ .Values.registry.components.mirror.managed }}
    - kind: route
      managed: {{ .Values.registry.components.route.managed | default true }}
    - kind: tls
      managed: {{ .Values.registry.components.tls.managed | default true }}
    - kind: monitoring
      managed: {{ .Values.registry.components.monitoring.managed | default true }}
{{- end }}

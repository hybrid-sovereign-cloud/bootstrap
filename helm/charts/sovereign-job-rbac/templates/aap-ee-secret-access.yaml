---
# Allow AAP Execution Environments to read the argocd-cluster-services secret
# so they can connect to the services cluster.
# AAP EE runs under:
#   - "default" SA in aap namespace (activation pods)
#   - "sovereign-aap-controller" SA in aap namespace (automation controller task pods)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aap-ee-argocd-secret-reader
  namespace: openshift-gitops
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argocd-cluster-services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aap-ee-argocd-secret-reader
  namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aap-ee-argocd-secret-reader
subjects:
  - kind: ServiceAccount
    name: default
    namespace: aap
  - kind: ServiceAccount
    name: sovereign-aap-controller
    namespace: aap

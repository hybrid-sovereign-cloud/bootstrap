---
# ClusterRole granting the dashboard-central-reader SA read access to routes and
# deployments on the central cluster. Used by the sovereign-cloud-dashboard to
# enumerate central cluster service URLs and operator statuses.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-central-reader
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["hybridsovereign.redhat"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-central-reader
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# Long-lived token for the dashboard-central-reader SA
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-central-reader-token
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/service-account.name: dashboard-central-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-central-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard-central-reader
subjects:
  - kind: ServiceAccount
    name: dashboard-central-reader
    namespace: sovereign-cloud-helpers
---
# Push SA token to central Vault so the services-cluster dashboard can pull it
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: dashboard-central-reader-push
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: dashboard-central-reader-token
  data:
    - match:
        secretKey: token
        remoteRef:
          remoteKey: dashboard-central-reader
          property: token
    - match:
        secretKey: ca.crt
        remoteRef:
          remoteKey: dashboard-central-reader
          property: ca_crt

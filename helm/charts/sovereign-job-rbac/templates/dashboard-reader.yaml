---
# ClusterRole granting the dashboard-central-reader SA read access to routes and
# deployments on the central cluster. Used by the sovereign-cloud-dashboard to
# enumerate central cluster service URLs and operator statuses.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-central-reader
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["hybridsovereign.redhat"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-central-reader
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
# Long-lived token for the dashboard-central-reader SA
apiVersion: v1
kind: Secret
metadata:
  name: dashboard-central-reader-token
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    kubernetes.io/service-account.name: dashboard-central-reader
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-central-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dashboard-central-reader
subjects:
  - kind: ServiceAccount
    name: dashboard-central-reader
    namespace: sovereign-cloud-helpers
---
# RBAC: allow the job SA to read the dashboard-central-reader-token secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dashboard-reader-token-reader
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["dashboard-central-reader-token"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dashboard-reader-token-reader
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dashboard-reader-token-reader
subjects:
  - kind: ServiceAccount
    name: sovereign-ansible-runner
    namespace: sovereign-cloud-helpers
---
# Job to push the SA token to central Vault
# ESO PushSecret cannot manage kubernetes.io/service-account-token typed secrets,
# so this Job reads the token and writes it to Vault via the Vault HTTP API.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-push-dashboard-reader
  namespace: sovereign-cloud-helpers
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 4
  activeDeadlineSeconds: 300
  template:
    spec:
      serviceAccountName: sovereign-ansible-runner
      restartPolicy: OnFailure
      containers:
        - name: vault-push
          image: registry.redhat.io/ansible-automation-platform/ee-supported-rhel9:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SA_TOKEN=$(cat /var/run/secrets/sa-token/token)
              CA_CRT=$(base64 -w0 /var/run/secrets/sa-token/ca.crt)
              API_SERVER=$(cat /var/run/secrets/kubernetes.io/serviceaccount/apiserver-url 2>/dev/null || \
                           echo "https://kubernetes.default.svc")
              # Vault login via kubernetes auth
              VAULT_ADDR=http://vault.central-vault.svc.cluster.local:8200
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              VAULT_TOKEN=$(curl -sf $VAULT_ADDR/v1/auth/kubernetes-central/login \
                -d "{\"jwt\":\"$KUBE_TOKEN\",\"role\":\"sovereign-ansible-runner\"}" | \
                python3 -c "import sys,json; print(json.load(sys.stdin)['auth']['client_token'])")
              # Write to Vault
              curl -sf -H "X-Vault-Token: $VAULT_TOKEN" \
                -X POST "$VAULT_ADDR/v1/central/data/dashboard-central-reader" \
                -d "{\"data\":{\"token\":\"$SA_TOKEN\",\"ca_crt\":\"$CA_CRT\",\"api_server\":\"$API_SERVER\"}}"
              echo "dashboard-central-reader secret pushed to Vault"
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: sa-token
              mountPath: /var/run/secrets/sa-token
              readOnly: true
      volumes:
        - name: sa-token
          secret:
            secretName: dashboard-central-reader-token

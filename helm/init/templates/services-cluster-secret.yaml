---
# Registers the "services" cluster with ArgoCD.
# ArgoCD discovers this secret via the label argocd.argoproj.io/secret-type=cluster.
# The config block encodes the bearer-token approach; swap for in-cluster if desired.
apiVersion: v1
kind: Secret
metadata:
  name: argocd-cluster-{{ .Values.clusters.services.name }}
  namespace: {{ .Values.argocd.namespace }}
  labels:
    argocd.argoproj.io/secret-type: cluster
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  name: {{ .Values.clusters.services.name | quote }}
  server: {{ .Values.clusters.services.server | quote }}
  config: |
    {
      "bearerToken": "",
      "tlsClientConfig": {
        "insecure": {{ .Values.clusters.services.tlsSkipVerify }}
      },
      "username": {{ .Values.clusters.services.username | quote }},
      "password": {{ .Values.clusters.services.password | quote }}
    }

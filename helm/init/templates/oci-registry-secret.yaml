---
# ArgoCD repository credential for the OCI registry.
# Allows ArgoCD to pull Helm charts from the private OCI registry.
# Uses the robot account (read-only access).
apiVersion: v1
kind: Secret
metadata:
  name: sovereign-oci-registry
  namespace: {{ .Values.argocd.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repository
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  type: helm
  name: sovereign-oci
  enableOCI: "true"
  url: {{ printf "oci://%s/%s" .Values.oci.registry .Values.oci.namespace | quote }}
  username: {{ .Values.oci.robotUsername | quote }}
  password: {{ .Values.oci.robotPassword | quote }}

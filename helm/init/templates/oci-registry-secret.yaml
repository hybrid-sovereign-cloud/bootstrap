---
# ArgoCD repository credential template for all OCI charts in the namespace.
# Covers all charts: rhacm, sovereign-namespaces, rhbk, etc.
# Uses the robot account (read-only access).
apiVersion: v1
kind: Secret
metadata:
  name: sovereign-oci-creds
  namespace: {{ .Values.argocd.namespace }}
  labels:
    argocd.argoproj.io/secret-type: repo-creds
    {{- include "sovereign-init.labels" . | nindent 4 }}
  annotations:
    managed-by: sovereign-init-chart
type: Opaque
stringData:
  type: helm
  name: sovereign-oci
  enableOCI: "true"
  url: {{ printf "oci://%s/%s" .Values.oci.registry .Values.oci.namespace | quote }}
  username: {{ .Values.oci.robotUsername | quote }}
  password: {{ .Values.oci.robotPassword | quote }}
---

{{- if and .Values.gitopsOperator.enabled (include "sovereign-init.bootstrapSecrets" .) }}
# Declarative Argo CD instance tuning (cmdParams + optional per-component resource overrides).
# Default resource stripping runs via configure-argocd-instance.sh during bootstrap.
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: {{ .Values.gitopsOperator.argocdInstanceName }}
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-init.labels" . | nindent 4 }}
spec:
  {{- with .Values.gitopsOperator.cmdParams }}
  cmdParams:
    {{- range $key, $value := . }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
  # Enable server-side diff globally — this makes ArgoCD use the API server for diff
  # calculation and prevents the MCE ocm-proxyserver's broken OpenAPI v2 $ref
  # (github.com~1stolostron~1...) from failing the entire cluster cache sync.
  extraConfig:
    resource.compareoptions: |
      serverSideDiff: true
  # Exclude RHACM clusterview CRDs — their broken OpenAPI schema corrupts ArgoCD's cache.
  resourceExclusions: |
    - apiGroups:
      - "clusterview.open-cluster-management.io"
      kinds:
      - "*"
      clusters:
      - "*"
  {{- $overrides := .Values.gitopsOperator.resourceOverrides | default dict }}
  {{- range $component := list "controller" "server" "repo" "applicationSet" "dex" "redis" }}
  {{- with index $overrides $component }}
  {{ $component }}:
    resources:
      {{- toYaml . | nindent 6 }}
  {{- end }}
  {{- end }}
{{- end }}

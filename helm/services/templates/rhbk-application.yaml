{{- if .Values.rhbk.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rhbk-services
  namespace: {{ .Values.argocd.namespace }}
  labels:
    {{- include "sovereign-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.rhbk.syncWave | quote }}
spec:
  project: default

  source:
    repoURL: {{ printf "%s/rhbk" (include "sovereign-services.ociURL" .) | quote }}
    chart: rhbk
    targetRevision: {{ .Values.rhbk.chartVersion | quote }}
    helm:
      releaseName: rhbk-services
      values: |
        {{- toYaml .Values.rhbk.values | nindent 8 }}

  destination:
    server: {{ .Values.targetCluster.server | quote }}
    namespace: {{ .Values.rhbk.destinationNamespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
{{- end }}

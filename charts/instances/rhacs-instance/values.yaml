namespace: stackrox

central:
  name: stackrox-central-services
  # Resource overrides — reduce defaults for resource-constrained clusters.
  # Remove to use RHACS defaults (1500m CPU, 4Gi memory for Central).
  resources:
    requests:
      cpu: "750m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  # Persistent storage for Central DB
  db:
    storageClass: ""  # empty = cluster default
    storageSize: 100Gi
    # Resource overrides for Central DB — reduce defaults for constrained clusters.
    # Remove to use RHACS defaults (4 CPU, 8Gi memory for Central DB).
    resources:
      requests:
        cpu: "500m"
        memory: "4Gi"
      limits:
        cpu: "4"
        memory: "12Gi"
  # Monitoring
  monitoring:
    openshift:
      enabled: true
  # Exposure via Route
  exposure:
    loadBalancer:
      enabled: false
    route:
      enabled: true

securedCluster:
  name: stackrox-secured-cluster-services
  # ClusterName shown in ACS console
  clusterName: local-cluster
  centralEndpoint: ""  # populated by config job from Central route

scanner:
  analyzer:
    # Resource overrides for Scanner Analyzer — reduce defaults for constrained clusters.
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

scannerV4:
  indexer:
    # Resource overrides for Scanner V4 Indexer — reduce defaults for constrained clusters.
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "3Gi"
  matcher:
    # Resource overrides for Scanner V4 Matcher — reduce defaults for constrained clusters.
    resources:
      requests:
        cpu: "500m"
        memory: "3Gi"
      limits:
        cpu: "2"
        memory: "6Gi"

waitJob:
  image: registry.redhat.io/openshift4/ose-cli:latest
  timeoutMinutes: 20

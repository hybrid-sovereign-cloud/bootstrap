apiVersion: platform.stackrox.io/v1alpha1
kind: Central
metadata:
  name: {{ .Values.central.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  central:
    {{- if .Values.central.resources }}
    resources:
      {{- toYaml .Values.central.resources | nindent 6 }}
    {{- end }}
    exposure:
      loadBalancer:
        enabled: {{ .Values.central.exposure.loadBalancer.enabled }}
      route:
        enabled: {{ .Values.central.exposure.route.enabled }}
    db:
      {{- if .Values.central.db.resources }}
      resources:
        {{- toYaml .Values.central.db.resources | nindent 8 }}
      {{- end }}
      {{- if .Values.central.db.storageClass }}
      persistence:
        persistentVolumeClaim:
          storageClassName: {{ .Values.central.db.storageClass }}
      {{- else }}
      persistence:
        persistentVolumeClaim: {}
      {{- end }}
      {{- /* NOTE: size/storageClass omitted intentionally — if the PVC already exists
           the ACS operator cannot reconcile immutable fields and will fail with
           "Irreconcilable". The PVC is created on first deploy; on subsequent
           syncs the operator adopts the existing PVC. */ -}}
  {{- if .Values.scanner }}
  scanner:
    {{- if .Values.scanner.analyzer }}
    analyzer:
      {{- if .Values.scanner.analyzer.resources }}
      resources:
        {{- toYaml .Values.scanner.analyzer.resources | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .Values.scannerV4 }}
  scannerV4:
    {{- if .Values.scannerV4.indexer }}
    indexer:
      {{- if .Values.scannerV4.indexer.resources }}
      resources:
        {{- toYaml .Values.scannerV4.indexer.resources | nindent 8 }}
      {{- end }}
    {{- end }}
    {{- if .Values.scannerV4.matcher }}
    matcher:
      {{- if .Values.scannerV4.matcher.resources }}
      resources:
        {{- toYaml .Values.scannerV4.matcher.resources | nindent 8 }}
      {{- end }}
    {{- end }}
  {{- end }}
  monitoring:
    openshift:
      enabled: {{ .Values.central.monitoring.openshift.enabled }}

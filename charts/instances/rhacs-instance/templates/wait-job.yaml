apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacs-wait-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhacs-wait-reader
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["platform.stackrox.io"]
    resources: ["centrals", "securedclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhacs-wait-reader
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhacs-wait-reader
subjects:
  - kind: ServiceAccount
    name: rhacs-wait-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rhacs-wait-ready
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: rhacs-wait
    spec:
      serviceAccountName: rhacs-wait-sa
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: {{ .Values.waitJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              TIMEOUT={{ .Values.waitJob.timeoutMinutes }}
              echo "Waiting up to ${TIMEOUT}m for Central to be Ready..."
              elapsed=0
              until oc get central {{ .Values.central.name }} \
                -n {{ .Release.Namespace }} \
                -o jsonpath='{.status.conditions[?(@.type=="Deployed")].status}' \
                2>/dev/null | grep -qi true; do
                elapsed=$((elapsed+30))
                if [ $elapsed -ge $((TIMEOUT*60)) ]; then
                  echo "ERROR: Central not ready after ${TIMEOUT}m"
                  exit 1
                fi
                echo "  Central not yet Deployed — ${elapsed}s elapsed"
                sleep 30
              done
              echo "ACS Central is Deployed!"

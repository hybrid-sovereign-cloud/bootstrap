# Git repository for Argo CD (same URL as GitHub/GitLab remote used for sync).
# Env: GITHUB_URL, GITHUB_TOKEN (passed via Makefile / helm --set*)
github:
  repositoryUrl: ""
  token: ""
  # Skip TLS verification when cloning / repo server (string "true" for Argo secret)
  insecure: "true"
  username: "git"

# OCI Helm registry credentials for ArgoCD.
# All repos in ociRegistry.url MUST remain PRIVATE.
# The template generates:
#   - one repo-creds (credential template) matching the host
#   - one per-repository secret for each entry in `repositories`
# Pass robot credentials at install time:
#   --set-string ociRegistry.username=$OCI_ROBOT_USERNAME
#   --set-string ociRegistry.password=$OCI_ROBOT_PASSWORD
ociRegistry:
  enabled: true
  url: "quay.signal9.gg/hybrid-sovereign"
  username: ""  # OCI_ROBOT_USERNAME  e.g. hybrid-sovereign+pull
  password: ""  # OCI_ROBOT_PASSWORD  (robot token)
  # OCI Helm chart repositories that ArgoCD Applications use as sources.
  # Each entry generates an individual ArgoCD repository secret (required for v3.x OCI auth).
  repositories:
    - external-secrets-operator
    - aap-plugin-operator
    - iaac-plugin-operator
    - quay-plugin-operator
    - vault-plugin-operator

# Optional: tighten Argo CD server behavior when using self-signed Git endpoints.
argocd:
  # When true, merge server.insecure: true on the openshift-gitops ArgoCD CR (if chart deploys it).
  serverInsecure: false
  # Application controller memory must be increased when managing many large operators (RHACM, RHACS)
  controllerResources:
    limits:
      cpu: "4"
      memory: "6Gi"
    requests:
      cpu: "500m"
      memory: "2Gi"

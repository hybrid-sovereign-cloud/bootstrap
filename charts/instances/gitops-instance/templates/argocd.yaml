apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: openshift-gitops
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  {{- if .Values.argocd.serverInsecure }}
  server:
    insecure: true
  {{- end }}
  controller:
    resources:
      limits:
        cpu: {{ .Values.argocd.controllerResources.limits.cpu | quote }}
        memory: {{ .Values.argocd.controllerResources.limits.memory | quote }}
      requests:
        cpu: {{ .Values.argocd.controllerResources.requests.cpu | quote }}
        memory: {{ .Values.argocd.controllerResources.requests.memory | quote }}
  # Exclude resources that cause cache errors (RHACM addon webhooks during install,
  # high-churn resources, cluster-internal resources not managed by ArgoCD).
  resourceExclusions: |
    - apiGroups:
      - ""
      - discovery.k8s.io
      clusters:
      - '*'
      kinds:
      - Endpoints
      - EndpointSlice
    - apiGroups:
      - apiregistration.k8s.io
      clusters:
      - '*'
      kinds:
      - APIService
    - apiGroups:
      - coordination.k8s.io
      clusters:
      - '*'
      kinds:
      - Lease
    - apiGroups:
      - authentication.k8s.io
      - authorization.k8s.io
      clusters:
      - '*'
      kinds:
      - SelfSubjectReview
      - TokenReview
      - LocalSubjectAccessReview
      - SelfSubjectAccessReview
      - SelfSubjectRulesReview
      - SubjectAccessReview
    - apiGroups:
      - certificates.k8s.io
      clusters:
      - '*'
      kinds:
      - CertificateSigningRequest
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
    - apiGroups:
      - addon.open-cluster-management.io
      clusters:
      - '*'
      kinds:
      - ManagedClusterAddOn
      - ClusterManagementAddOn

{{- if and .Values.ociRegistry.enabled .Values.ociRegistry.password }}
{{- $host := .Values.ociRegistry.url | splitList "/" | first -}}
{{- $org := .Values.ociRegistry.url | splitList "/" | rest | join "/" -}}
# repo-creds credential template (broad registry match)
apiVersion: v1
kind: Secret
metadata:
  name: quay-oci-helm-creds
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    argocd.argoproj.io/secret-type: repo-creds
stringData:
  type: helm
  enableOCI: "true"
  url: {{ $host | quote }}
  username: {{ .Values.ociRegistry.username | quote }}
  password: {{ .Values.ociRegistry.password | quote }}
---
{{- range .Values.ociRegistry.repositories }}
# Individual repository secret for ArgoCD v3.x OCI credential matching
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "oci-creds-%s" . | replace "/" "-" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
    argocd.argoproj.io/secret-type: repository
stringData:
  type: helm
  enableOCI: "true"
  url: {{ printf "oci://%s/%s/%s" $host $org . | quote }}
  username: {{ $.Values.ociRegistry.username | quote }}
  password: {{ $.Values.ociRegistry.password | quote }}
---
{{- end }}
{{- end }}

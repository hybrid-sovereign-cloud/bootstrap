# Phase 4: Entity beta with ALL container types
# Apply order: entity → rbac CRs → containers (cloud first, then platform)
#
# 1. Entity beta (cluster-scoped)
---
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: beta
spec:
  residency: iaas
  adminGroup:
    - beta/admins
  readGroup:
    - beta/readers
  developerGroup:
    - beta/developers
---
# 2. Fix existing ocp1 Container to set cloud (phase3: cloud now mandatory)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: ocp1
  namespace: entity-acme
spec:
  platformOpenshift:
    cloud: testaws-cloudaws
    openshiftVersion: "4.21"
    size: small
    rbac:
      adminGroup:
        - acme/admins
      developerGroup:
        - acme/developers
---
# 3. Rbac CRs for beta (create after entity-beta namespace exists)
apiVersion: rbacplugins.hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: admins
  namespace: entity-beta
spec:
  rbacConfig: keycloak-base
---
apiVersion: rbacplugins.hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: readers
  namespace: entity-beta
spec:
  rbacConfig: keycloak-base
---
apiVersion: rbacplugins.hybridsovereign.redhat/v1alpha1
kind: Rbac
metadata:
  name: developers
  namespace: entity-beta
spec:
  rbacConfig: keycloak-base
---
# 4. CloudAWS container for beta
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-aws
  namespace: entity-beta
spec:
  cloudAWS:
    awsAccount: "999000111222"
    landingZoneTemplate: "beta-lz"
    rbac:
      adminGroup:
        - beta/admins
      developerGroup:
        - beta/developers
---
# 5. CloudOSO container for beta
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-oso
  namespace: entity-beta
spec:
  cloudOSO:
    projectName: "beta-oso-project"
    landingZoneTemplate: "beta-oso-lz"
    capabilities:
      designateDomain: false
      quota: "10"
    rbac:
      adminGroup:
        - beta/admins
      developerGroup:
        - beta/developers
---
# 6. Team container for beta
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-team
  namespace: entity-beta
spec:
  team:
    capabilities:
      gitops: true
      istio: false
    adminGroup:
      - beta/admins
    readGroup:
      - beta/readers
    developerGroup:
      - beta/developers
---
# 7. PlatformOpenshift container for beta (cloud REQUIRED — points to beta-aws CloudAWS)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-ocp
  namespace: entity-beta
spec:
  platformOpenshift:
    cloud: beta-aws
    openshiftVersion: "4.21"
    size: small
    capabilities:
      operatorGitops: true
      operatorKafka: false
      openshiftAI: false
      openshiftVirt: false
    rbac:
      adminGroup:
        - beta/admins
      developerGroup:
        - beta/developers
---
# 8. Projects container for beta
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-projects
  namespace: entity-beta
spec:
  projects:
    capabilities:
      repo: "https://github.com/hybrid-sovereign-cloud/beta-app"
      path: "deploy/"
      gitTokenSecret: "beta-git-token"
---
# 9. Assignment container for beta (maps teams → ocp clusters → projects)
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Container
metadata:
  name: beta-assignment
  namespace: entity-beta
spec:
  assignment:
    projects:
      - beta-projects
    division:
      - beta-team
    ocp:
      - beta-ocp
    rbac:
      adminGroup:
        - beta/admins
      developerGroup:
        - beta/developers

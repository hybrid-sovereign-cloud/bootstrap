# Example PipelineRuns — apply with: oc create -f all-operators.yaml -n sovereign-cloud
# Or use: make trigger-build-all   (from bootstrap/)
#
# NOTE: Use 'oc create' (not 'oc apply') since generateName creates a unique name each time.

---
# plugin_rbac
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: plugin-rbac-build-
  namespace: sovereign-cloud
  labels:
    operator: plugin-rbac
spec:
  pipelineRef:
    name: ansible-operator-image-build
  params:
    - name: git-url
      value: https://github.com/hybrid-sovereign-cloud/plugin_rbac.git
    - name: image-name
      value: plugin-rbac-operator
    - name: image-tag
      value: latest
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: ansible-operator-build-workspace
    - name: git-credentials
      secret:
        secretName: github-basic-auth
---

# Second Entity for multi-tenant QA (Phases 4–5): apply after Keycloak/Rbac paths exist for beta/* groups.
apiVersion: hybridsovereign.redhat/v1alpha1
kind: Entity
metadata:
  name: beta
spec:
  residency: iaas
  adminGroup:
    - beta/admins
  readGroup:
    - beta/readers
  developerGroup:
    - beta/developers

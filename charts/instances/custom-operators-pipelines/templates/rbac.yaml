# Grant the Tekton pipeline ServiceAccount edit access in the build namespace.
# OpenShift Pipelines creates a 'pipeline' SA in each namespace; binding 'edit'
# allows the pipeline to manage PVCs, ConfigMaps, and other build resources.
# Image pushes target Quay (not the internal registry) via quay-push-credentials secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-sa-edit
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit

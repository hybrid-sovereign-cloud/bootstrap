---
# ExternalSecret: reads Quay robot credentials from Vault and creates a
# kubernetes.io/dockerconfigjson Secret for Tekton buildah to push images.
# Vault path: central/quay/robot (stored via: make vault-store-quay-robot-token)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: quay-push-credentials
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: quay-push-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"{{ .Values.quayRegistry }}":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .password }}` }}","auth":"{{ `{{ printf "%s:%s" .username .password | b64enc }}` }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: quay/robot
        property: username
    - secretKey: password
      remoteRef:
        key: quay/robot
        property: password

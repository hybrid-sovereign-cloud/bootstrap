---
# Pipeline: clone the console repo and build+push its image to Quay.
# Uses git-clone (Tekton Hub) and buildah (OpenShift Pipelines) tasks.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: nodejs-console-build
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  description: >
    Clones the sovereign-cloud console repository, builds the container image
    using buildah from the Containerfile at the repo root, and pushes it to
    Quay ({{ .Values.quayRegistry }}/{{ .Values.quayOrg }}).
  params:
    - name: git-url
      type: string
      description: Full HTTPS URL of the console Git repository
      default: "https://github.com/hybrid-sovereign-cloud/console.git"
    - name: git-revision
      type: string
      default: main
      description: Branch or commit to build
    - name: image-registry
      type: string
      default: {{ .Values.quayRegistry | quote }}
    - name: image-namespace
      type: string
      default: {{ .Values.quayOrg | quote }}
    - name: image-name
      type: string
      default: "sovereign-cloud-console"
    - name: image-tag
      type: string
      default: latest
    - name: containerfile
      type: string
      default: "console-plugin/Containerfile"
      description: Path to Containerfile relative to repo root
  workspaces:
    - name: source
    - name: git-credentials
      optional: true
  tasks:
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-credentials

    - name: build-and-push
      runAfter: [git-clone]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "$(params.image-registry)/$(params.image-namespace)/$(params.image-name):$(params.image-tag)"
        - name: DOCKERFILE
          value: $(params.containerfile)
        - name: CONTEXT
          value: "."
        - name: TLSVERIFY
          value: "false"
        - name: BUILD_EXTRA_ARGS
          value: "--platform=linux/amd64"
      workspaces:
        - name: source
          workspace: source

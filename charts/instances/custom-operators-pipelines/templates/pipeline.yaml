---
# Shared Pipeline: clone an Ansible operator repo and build+push its image to an ImageStream.
# Uses the git-clone and buildah Tasks pre-installed in the openshift-pipelines namespace
# via the Tekton cluster resolver (no custom images needed).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: {{ .Values.pipelineName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  description: >
    Clones an Ansible Operator repository from GitHub, builds the container image
    using buildah, and pushes it to the OpenShift internal registry ImageStream.
    Uses openshift-pipelines Tasks via the cluster resolver.
  params:
    - name: git-url
      type: string
      description: Full HTTPS URL of the operator Git repository
    - name: git-revision
      type: string
      default: main
      description: Branch or commit to build
    - name: image-registry
      type: string
      default: "image-registry.openshift-image-registry.svc:5000"
      description: Internal OpenShift registry host
    - name: image-namespace
      type: string
      default: {{ .Values.namespace | quote }}
      description: Namespace containing the target ImageStream
    - name: image-name
      type: string
      description: ImageStream name (= image name without registry prefix)
    - name: image-tag
      type: string
      default: latest
      description: Tag to push the image as
    - name: context-dir
      type: string
      default: "."
      description: Build context directory within the cloned repo
  workspaces:
    - name: source
      description: Workspace where the source code is cloned and built
    - name: git-credentials
      description: kubernetes.io/basic-auth Secret with username and password for GitHub HTTPS auth
      optional: true
  tasks:
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SSL_VERIFY
          value: "false"
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-credentials

    - name: build-and-push
      runAfter: [git-clone]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "$(params.image-registry)/$(params.image-namespace)/$(params.image-name):$(params.image-tag)"
        - name: CONTEXT
          value: $(params.context-dir)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: TLS_VERIFY
          value: "false"
        - name: STORAGE_DRIVER
          value: vfs
      workspaces:
        - name: source
          workspace: source

# Note: PipelineRun examples are in charts/instances/custom-operators-pipelines/samples/pipelineruns/
# Apply them manually with: oc create -f <file> -n sovereign-cloud
# Or use: make trigger-build OPERATOR=<name>   (from bootstrap/)

# ExternalSecret: reads GitHub PAT from Vault and creates a kubernetes.io/basic-auth
# Secret that the Tekton git-clone task uses to clone private repos.
# Vault path: central/github/token (stored during bootstrap phase1).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-basic-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: github-basic-auth
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: git
        password: "{{ `{{ .token }}` }}"
        # Tekton git-clone ClusterTask basic-auth workspace expects these files
        .git-credentials: "{{ `https://git:{{ .token }}@github.com` }}"
        .gitconfig: |
          [credential "https://github.com"]
            helper = store
  data:
    - secretKey: token
      remoteRef:
        key: central/github
        property: token

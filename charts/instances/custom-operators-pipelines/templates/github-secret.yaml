# ExternalSecret: reads GitHub PAT from Vault and creates a kubernetes.io/basic-auth
# Secret that the Tekton git-clone task uses to clone private repos.
# Vault path: central/github/token (stored during bootstrap phase1).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-basic-auth
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-store
    kind: ClusterSecretStore
  target:
    name: github-basic-auth
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: git
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: central/github
        property: token

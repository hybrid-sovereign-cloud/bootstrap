namespace: open-cluster-management

multiClusterHub:
  name: multiclusterhub
  # availabilityConfig: High requires 3 replicas; use Basic for single-node/ROSA
  availabilityConfig: High
  disableHubSelfManagement: false
  # Ingress certificate type: default uses cluster wildcard
  ingress:
    sslCiphers: []

# Wait job config
waitJob:
  image: registry.redhat.io/openshift4/ose-cli:latest
  timeoutMinutes: 30

apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacm-wait-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rhacm-wait-reader
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["operator.open-cluster-management.io"]
    resources: ["multiclusterhubs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhacm-wait-reader
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rhacm-wait-reader
subjects:
  - kind: ServiceAccount
    name: rhacm-wait-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: rhacm-wait-ready
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 20
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: rhacm-wait
    spec:
      serviceAccountName: rhacm-wait-sa
      restartPolicy: OnFailure
      containers:
        - name: wait
          image: {{ .Values.waitJob.image }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              TIMEOUT={{ .Values.waitJob.timeoutMinutes }}
              echo "Waiting up to ${TIMEOUT}m for MultiClusterHub to be Running..."
              elapsed=0
              until oc get multiclusterhub {{ .Values.multiClusterHub.name }} \
                -n {{ .Release.Namespace }} \
                -o jsonpath='{.status.phase}' 2>/dev/null | grep -qx Running; do
                elapsed=$((elapsed+30))
                if [ $elapsed -ge $((TIMEOUT*60)) ]; then
                  echo "ERROR: MultiClusterHub not Running after ${TIMEOUT}m"
                  oc get multiclusterhub {{ .Values.multiClusterHub.name }} -n {{ .Release.Namespace }} -o yaml | tail -30
                  exit 1
                fi
                echo "  phase=$(oc get multiclusterhub {{ .Values.multiClusterHub.name }} -n {{ .Release.Namespace }} -o jsonpath='{.status.phase}' 2>/dev/null || echo unknown) — ${elapsed}s elapsed"
                sleep 30
              done
              echo "MultiClusterHub is Running!"

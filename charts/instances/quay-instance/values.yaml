name: central-registry

objectStorage:
  bucketClassName: openshift-storage.noobaa.io
  storageNamespace: openshift-storage

# Resource requests/limits reduced from defaults to fit constrained clusters
quayApp:
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "6Gi"
      cpu: "2"

clair:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2"

postgres:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2"

redis:
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1"

clairPostgres:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2"

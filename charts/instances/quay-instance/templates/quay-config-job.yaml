apiVersion: v1
kind: ServiceAccount
metadata:
  name: quay-config-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-config-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-config-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-config-secrets
subjects:
  - kind: ServiceAccount
    name: quay-config-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quay-noobaa-reader
  namespace: {{ .Values.objectStorage.storageNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["noobaa-admin"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quay-noobaa-reader
  namespace: {{ .Values.objectStorage.storageNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: quay-noobaa-reader
subjects:
  - kind: ServiceAccount
    name: quay-config-sa
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: quay-config-bundle
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app: quay-config
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: quay-config
    spec:
      serviceAccountName: quay-config-sa
      restartPolicy: OnFailure
      containers:
        - name: config
          image: registry.redhat.io/openshift4/ose-cli:latest
          env:
            - name: REGISTRY_NAME
              value: {{ .Values.name }}
            - name: NOOBAA_NS
              value: {{ .Values.objectStorage.storageNamespace }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/bin/bash"]
          args:
            - -c
            - |
              set -euo pipefail
              OBC_NAME="${REGISTRY_NAME}-obc"

              echo "Reading OBC bucket details from ConfigMap ${OBC_NAME}..."
              BUCKET_NAME=$(oc get configmap "$OBC_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.data.BUCKET_NAME}')
              S3_HOST=$(oc get configmap "$OBC_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.data.BUCKET_HOST}')
              S3_PORT=$(oc get configmap "$OBC_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.data.BUCKET_PORT}')
              [ -z "$S3_HOST" ] && S3_HOST="s3.openshift-storage.svc"
              [ -z "$S3_PORT" ] && S3_PORT="443"
              [ -z "$BUCKET_NAME" ] && echo "ERROR: Empty BUCKET_NAME in OBC ConfigMap" && exit 1
              echo "Bucket: $BUCKET_NAME  Host: $S3_HOST:$S3_PORT"

              echo "Reading S3 credentials from OBC Secret ${OBC_NAME}..."
              ACCESS_KEY=$(oc get secret "$OBC_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              SECRET_KEY=$(oc get secret "$OBC_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)
              [ -z "$ACCESS_KEY" ] && echo "ERROR: Empty ACCESS_KEY in OBC Secret" && exit 1
              echo "S3 credentials obtained."

              CONFIG_YAML="DISTRIBUTED_STORAGE_CONFIG:
                default:
                  - RadosGWStorage
                  - access_key: ${ACCESS_KEY}
                    secret_key: ${SECRET_KEY}
                    bucket_name: ${BUCKET_NAME}
                    hostname: ${S3_HOST}
                    port: ${S3_PORT}
                    is_secure: true
                    storage_path: /datastorage/registry
              DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS: []
              DISTRIBUTED_STORAGE_PREFERENCE:
                - default
              FEATURE_USER_INITIALIZE: true
              SUPER_USERS:
                - initial-sovereign-admin"

              # Use oc apply (idempotent) to create-or-replace the config bundle secret
              oc create secret generic "${REGISTRY_NAME}-config-bundle" \
                -n "$NAMESPACE" \
                --from-literal="config.yaml=${CONFIG_YAML}" \
                --dry-run=client -o yaml | oc apply -f -

              echo "=== Config bundle applied ==="
              oc get secret "${REGISTRY_NAME}-config-bundle" -n "$NAMESPACE" \
                -o jsonpath='{.data.config\.yaml}' | base64 -d | grep bucket_name

gitea:
  fullnameOverride: gitea
  global:
    storageClass: ""
  persistence:
    enabled: true
    size: 5Gi
  # OpenShift: use anyuid SCC (see templates/scc-rolebinding.yaml) so the
  # init-directories container can chmod /data/git/.ssh. Run as UID 1000 (git user).
  # NOTE: No seccompProfile - anyuid SCC doesn't allow old-style seccomp annotations.
  podSecurityContext:
    fsGroup: 1000
  containerSecurityContext:
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile: null
  gitea:
    admin:
      username: sovereign-admin
      password: ""
      existingSecret: gitea-admin-secret
    config:
      server:
        DOMAIN: gitea.apps.REPLACE
        ROOT_URL: https://gitea.apps.REPLACE
      database:
        DB_TYPE: sqlite3
      service:
        DISABLE_REGISTRATION: true
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false
  redis-cluster:
    enabled: false
  valkey:
    enabled: false
  service:
    http:
      type: ClusterIP
      port: 3000
  ingress:
    enabled: false

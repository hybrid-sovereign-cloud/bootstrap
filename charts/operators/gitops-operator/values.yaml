# Cluster-scoped: OperatorGroup.spec.targetNamespaces is empty (all namespaces).
operatorNamespace: openshift-gitops
createNamespace: true

subscription:
  name: openshift-gitops-operator
  channel: latest
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace

operatorGroup:
  create: true
  # Namespace-scoped OG required by ROSA OLM for openshift-gitops
  targetNamespaces:
    - openshift-gitops

operatorNamespace: external-secrets-operator

subscription:
  name: openshift-external-secrets-operator
  channel: stable-v1
  installPlanApproval: Automatic
  source: redhat-operators
  sourceNamespace: openshift-marketplace

operatorGroup:
  create: true
  targetNamespaces: []

# Disabled by default: CRD is not available until after the operator CSV succeeds.
# Enable in a follow-up Application (e.g. external-secrets-config) after the operator is Running.
externalSecretsConfig:
  enabled: false

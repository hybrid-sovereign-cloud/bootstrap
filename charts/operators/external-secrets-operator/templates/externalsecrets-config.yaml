# ExternalSecretsConfig activates the ESO controllers deployed by the OLM operator.
# Without this CR, the external-secrets-operator-controller-manager will not deploy
# the actual ESO reconciler pods (external-secrets, cert-controller, webhook).
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: cluster
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec: {}

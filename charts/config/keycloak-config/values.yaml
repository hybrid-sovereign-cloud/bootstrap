keycloakUrl: ""
adminSecretName: central-keycloak-initial-admin
adminSecretNamespace: rhbk

realm: sovereign-tenants
group: sovereign-admins
clientId: sovereign-tenants-client

user:
  username: initial-sovereign-admin
  firstName: Sovereign
  lastName: Admin
  email: admin@sovereign.local

vaultAddr: "http://central-vault.vault.svc:8200"
vaultKvPath: "central"
vaultSecretName: vault-init-keys
vaultSecretNamespace: vault

sovereignNamespace: sovereign-cloud

# Per-service OIDC clients created in Keycloak and stored in Vault
serviceClients:
  quay:
    clientId: quay-oidc
    routeNamespace: quay
    vaultPath: quay/oidc
  openshift:
    clientId: openshift-oidc
    routeNamespace: openshift-authentication
    routeName: oauth-openshift
    vaultPath: openshift/oidc
  vault:
    clientId: vault-oidc
    routeNamespace: vault
    vaultPath: vault/oidc

curlImage: docker.io/curlimages/curl:8.12.0
jobServiceAccount: keycloak-config-sa

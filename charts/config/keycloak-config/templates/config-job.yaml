apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app: keycloak-config
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: keycloak-config
    spec:
      serviceAccountName: {{ .Values.jobServiceAccount }}
      restartPolicy: OnFailure
      containers:
        - name: config
          image: {{ .Values.curlImage }}
          env:
            - name: KC_URL
              value: {{ .Values.keycloakUrl | quote }}
            - name: REALM
              value: {{ .Values.realm }}
            - name: GROUP_NAME
              value: {{ .Values.group }}
            - name: CLIENT_ID
              value: {{ .Values.clientId }}
            - name: USERNAME
              value: {{ .Values.user.username }}
            - name: FIRST_NAME
              value: {{ .Values.user.firstName }}
            - name: LAST_NAME
              value: {{ .Values.user.lastName }}
            - name: EMAIL
              value: {{ .Values.user.email }}
            - name: VAULT_ADDR
              value: {{ .Values.vaultAddr }}
            - name: KV_PATH
              value: {{ .Values.vaultKvPath }}
            - name: VAULT_SECRET_NS
              value: {{ .Values.vaultSecretNamespace }}
            - name: VAULT_SECRET_NAME
              value: {{ .Values.vaultSecretName }}
            - name: ADMIN_SECRET_NAME
              value: {{ .Values.adminSecretName }}
            - name: QUAY_CLIENT_ID
              value: {{ .Values.serviceClients.quay.clientId | quote }}
            - name: QUAY_ROUTE_NS
              value: {{ .Values.serviceClients.quay.routeNamespace | quote }}
            - name: QUAY_VAULT_PATH
              value: {{ .Values.serviceClients.quay.vaultPath | quote }}
            - name: OCP_CLIENT_ID
              value: {{ .Values.serviceClients.openshift.clientId | quote }}
            - name: OCP_ROUTE_NS
              value: {{ .Values.serviceClients.openshift.routeNamespace | quote }}
            - name: OCP_ROUTE_NAME
              value: {{ .Values.serviceClients.openshift.routeName | quote }}
            - name: OCP_VAULT_PATH
              value: {{ .Values.serviceClients.openshift.vaultPath | quote }}
            - name: VAULT_CLIENT_ID
              value: {{ .Values.serviceClients.vault.clientId | quote }}
            - name: VAULT_ROUTE_NS
              value: {{ .Values.serviceClients.vault.routeNamespace | quote }}
            - name: VAULT_SVC_VAULT_PATH
              value: {{ .Values.serviceClients.vault.vaultPath | quote }}
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -e
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S="https://kubernetes.default.svc"

              kget() {
                curl -sk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$1/secrets/$2"
              }

              echo "=== Reading Keycloak admin credentials ==="
              ADMIN_JSON=$(kget "$NAMESPACE" "$ADMIN_SECRET_NAME")
              KC_USER=$(echo "$ADMIN_JSON" | sed -n 's/.*"username"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              KC_PASS=$(echo "$ADMIN_JSON" | sed -n 's/.*"password"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              KC_USER=$(printf '%s' "$KC_USER" | base64 -d)
              KC_PASS=$(printf '%s' "$KC_PASS" | base64 -d)

              echo "=== Reading Vault root token ==="
              VAULT_JSON=$(kget "$VAULT_SECRET_NS" "$VAULT_SECRET_NAME")
              VAULT_TOKEN=$(echo "$VAULT_JSON" | sed -n 's/.*"root-token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              VAULT_TOKEN=$(printf '%s' "$VAULT_TOKEN" | base64 -d)

              echo "=== Getting Keycloak admin token ==="
              KC_TOKEN=$(curl -sk -X POST "$KC_URL/realms/master/protocol/openid-connect/token" \
                -d "grant_type=password&client_id=admin-cli&username=$KC_USER&password=$KC_PASS" \
                | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              [ -z "$KC_TOKEN" ] && echo "ERROR: Failed to get KC token" && exit 1
              echo "Got Keycloak admin token."

              AUTH="Authorization: Bearer $KC_TOKEN"

              echo "=== Creating realm: $REALM ==="
              curl -sk -o /dev/null -w "%{http_code}" -X POST "$KC_URL/admin/realms" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"realm\":\"$REALM\",\"enabled\":true}" || true
              echo ""

              echo "=== Creating group: $GROUP_NAME ==="
              curl -sk -o /dev/null -w "%{http_code}" -X POST "$KC_URL/admin/realms/$REALM/groups" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{\"name\":\"$GROUP_NAME\"}" || true
              echo ""

              echo "=== Creating client: $CLIENT_ID ==="
              CLIENT_SECRET=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 32)
              HTTP_CODE=$(curl -sk -o /tmp/client-resp -w "%{http_code}" -X POST "$KC_URL/admin/realms/$REALM/clients" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{
                  \"clientId\":\"$CLIENT_ID\",
                  \"enabled\":true,
                  \"protocol\":\"openid-connect\",
                  \"publicClient\":false,
                  \"secret\":\"$CLIENT_SECRET\",
                  \"redirectUris\":[\"*\"],
                  \"standardFlowEnabled\":true,
                  \"directAccessGrantsEnabled\":true,
                  \"serviceAccountsEnabled\":true
                }")

              if [ "$HTTP_CODE" = "409" ]; then
                echo "Client exists. Fetching existing secret..."
                CLIENTS_JSON=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/clients?clientId=$CLIENT_ID")
                CID=$(echo "$CLIENTS_JSON" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                SECRET_JSON=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/clients/$CID/client-secret")
                CLIENT_SECRET=$(echo "$SECRET_JSON" | sed -n 's/.*"value"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
              fi
              echo "Client secret obtained."

              echo "=== Storing client secret in Vault ==="
              curl -sk -X POST "$VAULT_ADDR/v1/$KV_PATH/data/keycloak/$CLIENT_ID" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"client-id\":\"$CLIENT_ID\",\"client-secret\":\"$CLIENT_SECRET\",\"realm\":\"$REALM\",\"keycloak-url\":\"$KC_URL\"}}"
              echo ""

              echo "=== Creating user: $USERNAME ==="
              USER_PASSWORD=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9!@#' | head -c 24)
              HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" -X POST "$KC_URL/admin/realms/$REALM/users" \
                -H "$AUTH" -H "Content-Type: application/json" \
                -d "{
                  \"username\":\"$USERNAME\",
                  \"enabled\":true,
                  \"firstName\":\"$FIRST_NAME\",
                  \"lastName\":\"$LAST_NAME\",
                  \"email\":\"$EMAIL\",
                  \"credentials\":[{\"type\":\"password\",\"value\":\"$USER_PASSWORD\",\"temporary\":false}]
                }")
              echo "User create HTTP: $HTTP_CODE"

              echo "=== Storing user credentials in Vault ==="
              curl -sk -X POST "$VAULT_ADDR/v1/$KV_PATH/data/keycloak/$USERNAME" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"username\":\"$USERNAME\",\"password\":\"$USER_PASSWORD\",\"realm\":\"$REALM\"}}"
              echo ""

              echo "=== Adding user to group ==="
              USERS_JSON=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/users?username=$USERNAME")
              USER_ID=$(echo "$USERS_JSON" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              GROUPS_JSON=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/groups?search=$GROUP_NAME")
              GROUP_ID=$(echo "$GROUPS_JSON" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              if [ -n "$USER_ID" ] && [ -n "$GROUP_ID" ]; then
                curl -sk -o /dev/null -X PUT "$KC_URL/admin/realms/$REALM/users/$USER_ID/groups/$GROUP_ID" \
                  -H "$AUTH" -H "Content-Type: application/json" -d '{}'
                echo "User added to group."
              else
                echo "WARN: Could not find user ($USER_ID) or group ($GROUP_ID)."
              fi

              echo "=== Keycloak Config Complete ==="

              # ─── Helper: create or refresh an OIDC client ────────────────────────────
              # Usage: create_oidc_client <clientId> <redirectUri1> [<redirectUri2>]
              # Sets OIDC_SECRET to the client secret on success.
              create_oidc_client() {
                local CID="$1"; shift
                local REDIRECT_JSON=""
                for URI in "$@"; do
                  REDIRECT_JSON="${REDIRECT_JSON}\"${URI}\","
                done
                REDIRECT_JSON="[${REDIRECT_JSON%,}]"

                local NEW_SECRET
                NEW_SECRET=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 32)

                local HTTP
                HTTP=$(curl -sk -o /tmp/oc-resp -w "%{http_code}" -X POST "$KC_URL/admin/realms/$REALM/clients" \
                  -H "$AUTH" -H "Content-Type: application/json" \
                  -d "{
                    \"clientId\":\"$CID\",
                    \"enabled\":true,
                    \"protocol\":\"openid-connect\",
                    \"publicClient\":false,
                    \"secret\":\"$NEW_SECRET\",
                    \"redirectUris\":$REDIRECT_JSON,
                    \"standardFlowEnabled\":true,
                    \"directAccessGrantsEnabled\":true
                  }")

                if [ "$HTTP" = "201" ]; then
                  OIDC_SECRET="$NEW_SECRET"
                  echo "  Created client $CID (HTTP 201)"
                elif [ "$HTTP" = "409" ]; then
                  echo "  Client $CID exists – fetching current secret"
                  local CLIENTS
                  CLIENTS=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/clients?clientId=$CID")
                  local INTERNAL_ID
                  INTERNAL_ID=$(echo "$CLIENTS" | sed -n 's/.*"id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                  # Update redirect URIs on the existing client
                  curl -sk -o /dev/null -X PUT "$KC_URL/admin/realms/$REALM/clients/$INTERNAL_ID" \
                    -H "$AUTH" -H "Content-Type: application/json" \
                    -d "{\"clientId\":\"$CID\",\"redirectUris\":$REDIRECT_JSON}"
                  local SEC_JSON
                  SEC_JSON=$(curl -sk -H "$AUTH" "$KC_URL/admin/realms/$REALM/clients/$INTERNAL_ID/client-secret")
                  OIDC_SECRET=$(echo "$SEC_JSON" | sed -n 's/.*"value"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
                  echo "  Secret fetched for $CID"
                else
                  echo "  ERROR: HTTP $HTTP creating client $CID:"
                  cat /tmp/oc-resp
                  exit 1
                fi
              }

              # ─── Discover service routes via OpenShift Routes API ────────────────────
              # Returns spec.host for a route.  If ROUTE_NAME is set, fetch that
              # specific route object; otherwise return the first host from the list.
              get_route_host() {
                local NS="$1" ROUTE_NAME="$2"
                local API="$K8S/apis/route.openshift.io/v1/namespaces/$NS/routes"
                local RESP
                if [ -n "$ROUTE_NAME" ]; then
                  RESP=$(curl -sk -H "Authorization: Bearer $SA_TOKEN" "$API/$ROUTE_NAME")
                  echo "$RESP" | sed -n 's/.*"host"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1
                else
                  RESP=$(curl -sk -H "Authorization: Bearer $SA_TOKEN" "$API")
                  echo "$RESP" | sed -n 's/.*"host"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1
                fi
              }

              echo ""
              echo "=== Creating per-service OIDC clients ==="

              # ── Quay ──────────────────────────────────────────────────────────────────
              echo "--- Quay OIDC ---"
              QUAY_HOST=$(get_route_host "$QUAY_ROUTE_NS" "")
              [ -z "$QUAY_HOST" ] && echo "WARN: Could not discover Quay route, using wildcard" && QUAY_HOST="quay.placeholder"
              echo "  Quay host: $QUAY_HOST"
              create_oidc_client "$QUAY_CLIENT_ID" \
                "https://${QUAY_HOST}/*" \
                "https://${QUAY_HOST}/oauth2/keycloak/callback"
              QUAY_OIDC_SECRET="$OIDC_SECRET"

              curl -sk -o /dev/null -X POST "$VAULT_ADDR/v1/$KV_PATH/data/$QUAY_VAULT_PATH" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{
                  \"client-id\":\"$QUAY_CLIENT_ID\",
                  \"client-secret\":\"$QUAY_OIDC_SECRET\",
                  \"realm\":\"$REALM\",
                  \"keycloak-url\":\"$KC_URL\",
                  \"quay-hostname\":\"$QUAY_HOST\"
                }}"
              echo "  Stored quay OIDC credentials in Vault at $KV_PATH/$QUAY_VAULT_PATH"

              # ── OpenShift OAuth ───────────────────────────────────────────────────────
              echo "--- OpenShift OAuth OIDC ---"
              OCP_HOST=$(get_route_host "$OCP_ROUTE_NS" "$OCP_ROUTE_NAME")
              [ -z "$OCP_HOST" ] && OCP_HOST="oauth-openshift.placeholder"
              echo "  OAuth host: $OCP_HOST"
              create_oidc_client "$OCP_CLIENT_ID" \
                "https://${OCP_HOST}/*" \
                "https://${OCP_HOST}/oauth2callback/keycloak"
              OCP_OIDC_SECRET="$OIDC_SECRET"

              curl -sk -o /dev/null -X POST "$VAULT_ADDR/v1/$KV_PATH/data/$OCP_VAULT_PATH" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{
                  \"client-id\":\"$OCP_CLIENT_ID\",
                  \"client-secret\":\"$OCP_OIDC_SECRET\",
                  \"realm\":\"$REALM\",
                  \"keycloak-url\":\"$KC_URL\",
                  \"oauth-hostname\":\"$OCP_HOST\"
                }}"
              echo "  Stored OpenShift OIDC credentials in Vault at $KV_PATH/$OCP_VAULT_PATH"

              # ── Vault ─────────────────────────────────────────────────────────────────
              echo "--- Vault OIDC ---"
              VAULT_SVC_HOST=$(get_route_host "$VAULT_ROUTE_NS" "")
              [ -z "$VAULT_SVC_HOST" ] && VAULT_SVC_HOST="vault.placeholder"
              echo "  Vault host: $VAULT_SVC_HOST"
              create_oidc_client "$VAULT_CLIENT_ID" \
                "https://${VAULT_SVC_HOST}/*" \
                "https://${VAULT_SVC_HOST}/ui/vault/auth/oidc/oidc/callback" \
                "http://localhost:8250/oidc/callback"
              VAULT_OIDC_SECRET="$OIDC_SECRET"

              curl -sk -o /dev/null -X POST "$VAULT_ADDR/v1/$KV_PATH/data/$VAULT_SVC_VAULT_PATH" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{
                  \"client-id\":\"$VAULT_CLIENT_ID\",
                  \"client-secret\":\"$VAULT_OIDC_SECRET\",
                  \"realm\":\"$REALM\",
                  \"keycloak-url\":\"$KC_URL\",
                  \"vault-hostname\":\"$VAULT_SVC_HOST\"
                }}"
              echo "  Stored Vault OIDC credentials in Vault at $KV_PATH/$VAULT_SVC_VAULT_PATH"

              echo ""
              echo "=== All per-service OIDC clients configured ==="

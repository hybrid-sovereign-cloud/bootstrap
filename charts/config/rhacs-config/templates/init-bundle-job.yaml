apiVersion: batch/v1
kind: Job
metadata:
  name: rhacs-init-bundle
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: rhacs-init-bundle
    spec:
      serviceAccountName: rhacs-config-sa
      restartPolicy: OnFailure
      containers:
        - name: config
          image: {{ .Values.ocImage }}
          env:
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CENTRAL_NAME
              value: {{ .Values.centralName | quote }}
            - name: SECURED_CLUSTER_NAME
              value: {{ .Values.securedClusterName | quote }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: INIT_BUNDLE_SECRET
              value: {{ .Values.initBundleSecretName | quote }}
            - name: VAULT_ADDR
              value: {{ .Values.vaultAddr | quote }}
            - name: KV_PATH
              value: {{ .Values.vaultKvPath | quote }}
            - name: VAULT_SECRET_NS
              value: {{ .Values.vaultSecretNamespace | quote }}
            - name: VAULT_SECRET_NAME
              value: {{ .Values.vaultSecretName | quote }}
          command: ["/bin/bash"]
          args:
            - -c
            - |
              set -euo pipefail
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S="https://kubernetes.default.svc"

              echo "=== Waiting for Central to be ready ==="
              for i in $(seq 1 40); do
                PHASE=$(oc get central "$CENTRAL_NAME" -n "$NAMESPACE" \
                  -o jsonpath='{.status.conditions[?(@.type=="Deployed")].status}' 2>/dev/null || echo "")
                [ "$PHASE" = "True" ] && echo "Central deployed." && break
                echo "  attempt $i: Deployed=$PHASE"
                sleep 30
              done
              [ "$PHASE" != "True" ] && echo "ERROR: Central not ready" && exit 1

              echo "=== Discovering Central admin password ==="
              # ACS creates central-htpasswd secret
              for i in $(seq 1 20); do
                ADMIN_PASS=$(oc get secret central-htpasswd -n "$NAMESPACE" \
                  -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
                [ -n "$ADMIN_PASS" ] && break
                echo "  waiting for central-htpasswd secret... ($i)"
                sleep 15
              done
              [ -z "$ADMIN_PASS" ] && echo "ERROR: central-htpasswd secret not found" && exit 1

              echo "=== Getting Central route ==="
              CENTRAL_HOST=$(oc get route central -n "$NAMESPACE" \
                -o jsonpath='{.spec.host}' 2>/dev/null || echo "")
              [ -z "$CENTRAL_HOST" ] && echo "ERROR: Central route not found" && exit 1
              CENTRAL_URL="https://${CENTRAL_HOST}"
              echo "Central URL: $CENTRAL_URL"

              echo "=== Storing ACS credentials in Vault ==="
              VAULT_JSON=$(curl -sfk -H "Authorization: Bearer $SA_TOKEN" \
                "$K8S/api/v1/namespaces/$VAULT_SECRET_NS/secrets/$VAULT_SECRET_NAME")
              VAULT_TOKEN=$(echo "$VAULT_JSON" | sed -n 's/.*"root-token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)

              curl -sk -o /dev/null -X POST "$VAULT_ADDR/v1/$KV_PATH/data/rhacs/admin" \
                -H "X-Vault-Token: $VAULT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"central-url\":\"$CENTRAL_URL\",\"admin-password\":\"$ADMIN_PASS\"}}"
              echo "ACS admin credentials stored in Vault at $KV_PATH/rhacs/admin"

              echo "=== Generating init bundle via ACS API ==="
              # Check if init bundle already exists
              if oc get secret "$INIT_BUNDLE_SECRET" -n "$NAMESPACE" &>/dev/null; then
                echo "Init bundle secret $INIT_BUNDLE_SECRET already exists, skipping generation."
              else
                BUNDLE_RESP=$(curl -sk -u "admin:${ADMIN_PASS}" \
                  -X POST "${CENTRAL_URL}/v1/cluster-init/init-bundles" \
                  -H "Content-Type: application/json" \
                  -d "{\"name\":\"${CLUSTER_NAME}-bundle\"}")
                echo "Bundle response code check..."
                echo "$BUNDLE_RESP" | grep -q '"helmValuesBundle"' || { echo "ERROR: init bundle generation failed: $BUNDLE_RESP"; exit 1; }

                BUNDLE_B64=$(echo "$BUNDLE_RESP" | sed -n 's/.*"helmValuesBundle"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
                BUNDLE_YAML=$(printf '%s' "$BUNDLE_B64" | base64 -d)

                echo "=== Creating init bundle Kubernetes secret ==="
                # The bundle YAML contains TLS secrets - apply them
                echo "$BUNDLE_YAML" | oc apply -n "$NAMESPACE" -f -
                echo "Init bundle applied from helmValuesBundle."
              fi

              echo "=== Updating SecuredCluster with Central endpoint ==="
              CURRENT_ENDPOINT=$(oc get securedcluster "$SECURED_CLUSTER_NAME" -n "$NAMESPACE" \
                -o jsonpath='{.spec.centralEndpoint}' 2>/dev/null || echo "")
              DESIRED_ENDPOINT="${CENTRAL_HOST}:443"
              if [ "$CURRENT_ENDPOINT" != "$DESIRED_ENDPOINT" ]; then
                oc patch securedcluster "$SECURED_CLUSTER_NAME" -n "$NAMESPACE" \
                  --type=merge \
                  -p "{\"spec\":{\"centralEndpoint\":\"${DESIRED_ENDPOINT}\"}}"
                echo "SecuredCluster centralEndpoint patched to $DESIRED_ENDPOINT"
              else
                echo "SecuredCluster centralEndpoint already correct."
              fi

              echo "=== ACS Init Bundle Configuration Complete ==="
              echo "  Central URL: $CENTRAL_URL"
              echo "  Init bundle: $INIT_BUNDLE_SECRET"

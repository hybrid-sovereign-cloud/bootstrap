vaultAddr: "http://central-vault.vault.svc:8200"
vaultKvPath: central
vaultTokenSecretName: vault-token
vaultInitKeysSecretName: vault-init-keys
vaultInitKeysSecretNamespace: vault
secretStoreName: vault-backend

externalSecrets:
  - name: keycloak-client-secret
    remoteKey: keycloak/sovereign-tenants-client
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
  - name: gitea-admin-secret
    namespace: gitea
    remoteKey: gitea/admin
    keys:
      - vaultKey: username
        k8sKey: username
      - vaultKey: password
        k8sKey: password
  # OIDC client secrets for per-service Keycloak integration
  - name: quay-oidc-secret
    namespace: quay
    remoteKey: quay/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: quay-hostname
        k8sKey: quay-hostname
  - name: openshift-oidc-secret
    namespace: openshift-config
    remoteKey: openshift/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: clientSecret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
  - name: vault-oidc-secret
    namespace: vault
    remoteKey: vault/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: vault-hostname
        k8sKey: vault-hostname
  # Keycloak auth config for plugin_rbac and other operators
  - name: keycloak-auth-config
    remoteKey: keycloak/auth-config
    keys:
      - vaultKey: KC_USERNAME
        k8sKey: KC_USERNAME
      - vaultKey: KC_PASSWORD
        k8sKey: KC_PASSWORD
      - vaultKey: KC_REALM
        k8sKey: KC_REALM
      - vaultKey: KC_URL
        k8sKey: KC_URL

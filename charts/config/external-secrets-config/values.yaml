vaultAddr: "http://central-vault.vault.svc:8200"
vaultKvPath: central
vaultTokenSecretName: vault-token
vaultInitKeysSecretName: vault-init-keys
vaultInitKeysSecretNamespace: vault
secretStoreName: vault-backend

externalSecrets:
  - name: keycloak-client-secret
    remoteKey: keycloak/sovereign-tenants-client
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
  - name: gitea-admin-secret
    namespace: gitea
    remoteKey: gitea/admin
    keys:
      - vaultKey: username
        k8sKey: username
      - vaultKey: password
        k8sKey: password
  # OIDC client secrets for per-service Keycloak integration
  - name: quay-oidc-secret
    namespace: quay
    remoteKey: quay/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: quay-hostname
        k8sKey: quay-hostname
  - name: openshift-oidc-secret
    namespace: openshift-config
    remoteKey: openshift/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: clientSecret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
  - name: vault-oidc-secret
    namespace: vault
    remoteKey: vault/oidc
    keys:
      - vaultKey: client-id
        k8sKey: client-id
      - vaultKey: client-secret
        k8sKey: client-secret
      - vaultKey: keycloak-url
        k8sKey: keycloak-url
      - vaultKey: realm
        k8sKey: realm
      - vaultKey: vault-hostname
        k8sKey: vault-hostname
  # Keycloak auth config for plugin_rbac (sovereign-cloud) and other operators
  - name: keycloak-auth-config
    remoteKey: keycloak/auth-config
    keys:
      - vaultKey: KC_USERNAME
        k8sKey: KC_USERNAME
      - vaultKey: KC_PASSWORD
        k8sKey: KC_PASSWORD
      - vaultKey: KC_REALM
        k8sKey: KC_REALM
      - vaultKey: KC_AUTH_REALM
        k8sKey: KC_AUTH_REALM
      - vaultKey: KC_URL
        k8sKey: KC_URL
  # Keycloak auth config for plugin_rbac in sovereign-cloud-plugins namespace
  - name: keycloak-auth-config
    namespace: sovereign-cloud-plugins
    remoteKey: keycloak/auth-config
    keys:
      - vaultKey: KC_USERNAME
        k8sKey: KC_USERNAME
      - vaultKey: KC_PASSWORD
        k8sKey: KC_PASSWORD
      - vaultKey: KC_REALM
        k8sKey: KC_REALM
      - vaultKey: KC_AUTH_REALM
        k8sKey: KC_AUTH_REALM
      - vaultKey: KC_URL
        k8sKey: KC_URL
  # Vault admin token for plugin_vault operator
  - name: vault-admin-token
    namespace: sovereign-cloud-plugins
    remoteKey: vault/admin-token
    keys:
      - vaultKey: VAULT_TOKEN
        k8sKey: VAULT_TOKEN
  # AAP admin token for plugin_aap operator
  - name: aap-admin-token
    namespace: sovereign-cloud-plugins
    remoteKey: aap/admin-token
    keys:
      - vaultKey: AAP_CONTROLLER_TOKEN
        k8sKey: AAP_CONTROLLER_TOKEN
      - vaultKey: AAP_CONTROLLER_URL
        k8sKey: AAP_CONTROLLER_URL
      - vaultKey: AAP_GATEWAY_TOKEN
        k8sKey: AAP_GATEWAY_TOKEN
      - vaultKey: AAP_GATEWAY_URL
        k8sKey: AAP_GATEWAY_URL
  # Quay admin token for plugin_quay operator
  - name: quay-admin-token
    namespace: sovereign-cloud-plugins
    remoteKey: quay/admin-token
    keys:
      - vaultKey: QUAY_URL
        k8sKey: QUAY_URL
      - vaultKey: QUAY_TOKEN
        k8sKey: QUAY_TOKEN
      - vaultKey: QUAY_ADMIN_USER
        k8sKey: QUAY_ADMIN_USER
      - vaultKey: QUAY_ADMIN_PASSWORD
        k8sKey: QUAY_ADMIN_PASSWORD

apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-oidc-sa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
---
# Read OIDC secrets and OBC credentials in the release namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-oidc-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-oidc-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: service-oidc-secrets
subjects:
  - kind: ServiceAccount
    name: service-oidc-sa
    namespace: {{ .Release.Namespace }}
---
# Read/write Quay config-bundle secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-oidc-quay
  namespace: {{ .Values.quay.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-oidc-quay
  namespace: {{ .Values.quay.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: service-oidc-quay
subjects:
  - kind: ServiceAccount
    name: service-oidc-sa
    namespace: {{ .Release.Namespace }}
---
# Read vault-init-keys in vault namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-oidc-vault-read
  namespace: {{ .Values.vaultSecretNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.vaultSecretName | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-oidc-vault-read
  namespace: {{ .Values.vaultSecretNamespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: service-oidc-vault-read
subjects:
  - kind: ServiceAccount
    name: service-oidc-sa
    namespace: {{ .Release.Namespace }}
---
# Read vault OIDC secret in vault namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-oidc-vault-oidc
  namespace: {{ .Values.vault.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-oidc-vault-oidc
  namespace: {{ .Values.vault.namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: service-oidc-vault-oidc
subjects:
  - kind: ServiceAccount
    name: service-oidc-sa
    namespace: {{ .Release.Namespace }}
---
# Cluster-level: patch OAuth cluster CR + exec into vault pod
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: service-oidc-cluster
  labels:
    {{- include "chart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["config.openshift.io"]
    resources: ["oauths"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: service-oidc-cluster
  labels:
    {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: service-oidc-cluster
subjects:
  - kind: ServiceAccount
    name: service-oidc-sa
    namespace: {{ .Release.Namespace }}

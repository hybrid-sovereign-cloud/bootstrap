apiVersion: batch/v1
kind: Job
metadata:
  name: quay-oidc-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: quay-oidc-config
    spec:
      serviceAccountName: service-oidc-sa
      restartPolicy: OnFailure
      containers:
        - name: config
          image: docker.io/curlimages/curl:8.12.0
          env:
            - name: QUAY_NS
              value: {{ .Values.quay.namespace | quote }}
            - name: REGISTRY_NAME
              value: {{ .Values.quay.registryName | quote }}
            - name: OBC_NAME
              value: {{ .Values.quay.obcName | quote }}
            - name: OIDC_SECRET_NAME
              value: {{ .Values.quay.oidcSecretName | quote }}
          command: ["/bin/sh"]
          args:
            - -c
            - |
              set -eu
              SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S="https://kubernetes.default.svc"

              kget() { curl -sfk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$1/secrets/$2"; }
              cmget() { curl -sfk -H "Authorization: Bearer $SA_TOKEN" "$K8S/api/v1/namespaces/$1/configmaps/$2"; }

              # ── Wait for quay-oidc-secret to be populated by ESO ─────────────────────
              echo "Waiting for $OIDC_SECRET_NAME in $QUAY_NS ..."
              for i in $(seq 1 30); do
                SEC=$(kget "$QUAY_NS" "$OIDC_SECRET_NAME" 2>/dev/null || echo '{}')
                CLIENT_ID_B64=$(echo "$SEC" | sed -n 's/.*"client-id"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
                [ -n "$CLIENT_ID_B64" ] && break
                echo "  attempt $i – waiting 10s..."
                sleep 10
              done
              [ -z "$CLIENT_ID_B64" ] && echo "ERROR: $OIDC_SECRET_NAME not ready" && exit 1

              CLIENT_ID=$(printf '%s' "$CLIENT_ID_B64" | base64 -d)
              CLIENT_SECRET=$(kget "$QUAY_NS" "$OIDC_SECRET_NAME" | \
                sed -n 's/.*"client-secret"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)
              KC_URL=$(kget "$QUAY_NS" "$OIDC_SECRET_NAME" | \
                sed -n 's/.*"keycloak-url"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)
              REALM=$(kget "$QUAY_NS" "$OIDC_SECRET_NAME" | \
                sed -n 's/.*"realm"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)
              QUAY_HOST=$(kget "$QUAY_NS" "$OIDC_SECRET_NAME" | \
                sed -n 's/.*"quay-hostname"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)

              echo "Client: $CLIENT_ID  KC: $KC_URL  Host: $QUAY_HOST"

              # ── Read OBC storage credentials ─────────────────────────────────────────
              OBC_CM=$(cmget "$QUAY_NS" "$OBC_NAME")
              BUCKET_NAME=$(echo "$OBC_CM" | sed -n 's/.*"BUCKET_NAME"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              S3_HOST=$(echo "$OBC_CM" | sed -n 's/.*"BUCKET_HOST"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              S3_PORT=$(echo "$OBC_CM" | sed -n 's/.*"BUCKET_PORT"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)
              [ -z "$S3_HOST" ] && S3_HOST="s3.openshift-storage.svc"
              [ -z "$S3_PORT" ] && S3_PORT="443"
              [ -z "$BUCKET_NAME" ] && echo "ERROR: Empty BUCKET_NAME from OBC ConfigMap" && exit 1

              OBC_SEC=$(kget "$QUAY_NS" "$OBC_NAME")
              ACCESS_KEY=$(echo "$OBC_SEC" | sed -n 's/.*"AWS_ACCESS_KEY_ID"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)
              SECRET_KEY=$(echo "$OBC_SEC" | sed -n 's/.*"AWS_SECRET_ACCESS_KEY"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1 | base64 -d)
              [ -z "$ACCESS_KEY" ] && echo "ERROR: Empty ACCESS_KEY from OBC Secret" && exit 1

              echo "Storage: bucket=$BUCKET_NAME host=$S3_HOST:$S3_PORT"

              # ── Build full config.yaml with storage + OIDC ───────────────────────────
              OIDC_SERVER="${KC_URL}/realms/${REALM}/"

              CONFIG_YAML="DISTRIBUTED_STORAGE_CONFIG:
                default:
                  - RadosGWStorage
                  - access_key: ${ACCESS_KEY}
                    secret_key: ${SECRET_KEY}
                    bucket_name: ${BUCKET_NAME}
                    hostname: ${S3_HOST}
                    port: ${S3_PORT}
                    is_secure: true
                    storage_path: /datastorage/registry
              DISTRIBUTED_STORAGE_DEFAULT_LOCATIONS: []
              DISTRIBUTED_STORAGE_PREFERENCE:
                - default
              FEATURE_USER_INITIALIZE: true
              SUPER_USERS:
                - initial-sovereign-admin
              SERVER_HOSTNAME: ${QUAY_HOST}
              PREFERRED_URL_SCHEME: https
              FEATURE_DIRECT_LOGIN_ONLY: false
              OIDC_LOGIN_CONFIG:
                CLIENT_ID: ${CLIENT_ID}
                CLIENT_SECRET: ${CLIENT_SECRET}
                OIDC_SERVER: ${OIDC_SERVER}
                SERVICE_NAME: Keycloak
                LOGIN_SCOPES:
                  - openid
                  - profile
                  - email
                PREFERRED_USERNAME_CLAIM_NAME: preferred_username"

              # ── Apply config bundle (idempotent PUT) ─────────────────────────────────
              CONFIG_B64=$(printf '%s' "$CONFIG_YAML" | base64 | tr -d '\n')
              SECRET_JSON="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${REGISTRY_NAME}-config-bundle\",\"namespace\":\"$QUAY_NS\"},\"type\":\"Opaque\",\"data\":{\"config.yaml\":\"$CONFIG_B64\"}}"

              HTTP_CODE=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" \
                -H "Authorization: Bearer $SA_TOKEN" \
                -H "Content-Type: application/json" \
                -X PUT "$K8S/api/v1/namespaces/$QUAY_NS/secrets/${REGISTRY_NAME}-config-bundle" \
                -d "$SECRET_JSON")
              if [ "$HTTP_CODE" = "404" ]; then
                HTTP_CODE=$(curl -sk -o /tmp/resp.txt -w "%{http_code}" \
                  -H "Authorization: Bearer $SA_TOKEN" -H "Content-Type: application/json" \
                  -X POST "$K8S/api/v1/namespaces/$QUAY_NS/secrets" -d "$SECRET_JSON")
              fi
              echo "$HTTP_CODE" | grep -qE '^2' || { echo "ERROR applying config bundle: HTTP $HTTP_CODE"; cat /tmp/resp.txt; exit 1; }

              # ── Patch the Quay deployment to trigger rolling restart ──────────────────
              PATCH="{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"oidc-config-updated\":\"$(date -u +%Y%m%dT%H%M%S)\"}}}}}"
              curl -sk -o /dev/null \
                -H "Authorization: Bearer $SA_TOKEN" -H "Content-Type: application/json" \
                -X PATCH "$K8S/apis/apps/v1/namespaces/$QUAY_NS/deployments/${REGISTRY_NAME}-quay-app" \
                -d "$PATCH" || echo "WARN: Could not patch Quay deployment (may self-restart)"

              echo "=== Quay OIDC config applied ==="
              echo "  Client: $CLIENT_ID"
              echo "  OIDC Server: $OIDC_SERVER"

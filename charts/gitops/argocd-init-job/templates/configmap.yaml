apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  run.sh: |
    #!/bin/bash
    set -euo pipefail
    export HOME=/tmp
    dnf install -y --allowerasing git-core make tar gzip ca-certificates curl 2>/dev/null || \
    microdnf install -y git-core make tar gzip ca-certificates curl 2>/dev/null || \
    true
    ARCH=$(uname -m)
    case "$ARCH" in x86_64) HARCH=amd64 ;; aarch64) HARCH=arm64 ;; *) echo "unsupported arch $ARCH"; exit 1 ;; esac
    curl -fsSL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux-${HARCH}.tar.gz" | tar xz -C /usr/local/bin kubectl oc
    chmod +x /usr/local/bin/oc /usr/local/bin/kubectl
    curl -fsSL "https://get.helm.sh/helm-v3.14.4-linux-${HARCH}.tar.gz" | tar xz -C /usr/local/bin --strip-components=1 "linux-${HARCH}/helm"
    chmod +x /usr/local/bin/helm
    TOKEN=$(oc get secret -n "${REPO_NS}" "${REPO_NAME}" -o jsonpath='{.data.password}' | base64 -d)
    RAW=$(oc get secret -n "${REPO_NS}" "${REPO_NAME}" -o jsonpath='{.data.url}' | base64 -d)
    case "${RAW}" in
      https://*) HPATH="${RAW#https://}"; CLONE="https://x-access-token:${TOKEN}@${HPATH}" ;;
      http://*) HPATH="${RAW#http://}"; CLONE="http://x-access-token:${TOKEN}@${HPATH}" ;;
      *) echo "unsupported repo url"; exit 1 ;;
    esac
    rm -rf /tmp/repo-clone
    git clone --depth 1 --branch "${GIT_REVISION}" "${CLONE}" /tmp/repo-clone
    if [ -d /tmp/repo-clone/bootstrap ]; then cd /tmp/repo-clone/bootstrap; else cd /tmp/repo-clone; fi
    # shellcheck disable=SC2086
    make ${MAKE_TARGETS}

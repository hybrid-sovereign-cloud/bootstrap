apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSetName }}
  namespace: openshift-gitops
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=default
  generators:
    - list:
        elements:
        {{- range .Values.applications }}
          - name: {{ .name | quote }}
            path: {{ .path | quote }}
            namespace: {{ .namespace | quote }}
            wave: {{ .wave | quote }}
            param_hostname: {{ if eq .name "rhbk-instance" }}{{ printf "keycloak-rhbk.%s" $.Values.appsDomain | quote }}{{ else }}""{{ end }}
            param_keycloakUrl: {{ if or (eq .name "keycloak-config") (eq .name "service-oidc-config") (eq .name "rhacs-config") (eq .name "rhacm-config") }}{{ printf "https://keycloak-rhbk.%s" $.Values.appsDomain | quote }}{{ else }}""{{ end }}
            param_githubToken: {{ if eq .name "custom-operators-git-creds" }}{{ $.Values.githubToken | quote }}{{ else }}""{{ end }}
        {{- end }}
  template:
    metadata:
      name: '{{ "{{ .name }}" }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ "{{ .wave }}" }}'
      labels:
        argocd.argoproj.io/application-set: {{ .Values.applicationSetName | quote }}
    spec:
      project: default
      source:
        repoURL: {{ .Values.git.repoURL | quote }}
        targetRevision: {{ .Values.git.revision | quote }}
        path: '{{ "{{ .path }}" }}'
        helm:
          releaseName: '{{ "{{ .name }}" }}'
          parameters:
            - name: hostname
              value: '{{ "{{ .param_hostname }}" }}'
            - name: keycloakUrl
              value: '{{ "{{ .param_keycloakUrl }}" }}'
            - name: githubToken
              value: '{{ "{{ .param_githubToken }}" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ "{{ .namespace }}" }}'
      ignoreDifferences:
        # OLM adds upgradeStrategy and status to OperatorGroups after creation
        - group: operators.coreos.com
          kind: OperatorGroup
          jsonPointers:
            - /spec/upgradeStrategy
            - /status
        # ImageStreams are updated by OpenShift when images are imported
        - group: image.openshift.io
          kind: ImageStream
          jsonPointers:
            - /spec/tags
            - /status
        # Operator-managed CRs drift as operators reconcile their own fields
        - group: quay.redhat.com
          kind: QuayRegistry
          jsonPointers:
            - /status
            - /spec/components
        - group: noobaa.io
          kind: NooBaa
          jsonPointers:
            - /status
            - /spec
        - group: argoproj.io
          kind: ArgoCD
          jsonPointers:
            - /status
            - /spec
        # RHACM MultiClusterHub is heavily reconciled by the operator
        - group: operator.open-cluster-management.io
          kind: MultiClusterHub
          jsonPointers:
            - /status
            - /spec
        # RHACS Central and SecuredCluster drift as the operator reconciles them
        - group: platform.stackrox.io
          kind: Central
          jsonPointers:
            - /status
            - /spec
        - group: platform.stackrox.io
          kind: SecuredCluster
          jsonPointers:
            - /status
            - /spec
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true

# Required at helm install: real cluster apps domain (make phase2 passes it).
appsDomain: apps.REPLACE.example.com

applicationSetName: platform-gitops

# GitHub token for accessing private repos in the hybrid-sovereign-cloud org.
# Passed to custom-operators-git-creds at install time (make phase2-applicationset).
githubToken: ""

git:
  repoURL: https://github.com/hybrid-sovereign-cloud/bootstrap.git
  revision: main

applications:
  - name: aap-operator
    path: charts/operators/aap-operator
    namespace: ansible-automation-platform
    wave: "10"
  - name: external-secrets-operator
    path: charts/operators/external-secrets-operator
    namespace: external-secrets-operator
    wave: "20"
  - name: odf-operator
    path: charts/operators/odf-operator
    namespace: openshift-storage
    wave: "30"
  - name: openshift-pipelines-operator
    path: charts/operators/openshift-pipelines-operator
    namespace: openshift-operators
    wave: "40"
  - name: quay-operator
    path: charts/operators/quay-operator
    namespace: quay
    wave: "50"
  - name: rhbk-operator
    path: charts/operators/rhbk-operator
    namespace: rhbk
    wave: "60"
  - name: rhacm-operator
    path: charts/operators/rhacm-operator
    namespace: open-cluster-management
    wave: "65"
  - name: rhacs-operator
    path: charts/operators/rhacs-operator
    namespace: rhacs-operator
    wave: "70"
  - name: sovereign-cloud
    path: charts/instances/sovereign-cloud
    namespace: sovereign-cloud
    wave: "100"
  - name: vault-instance
    path: charts/instances/vault-instance
    namespace: vault
    wave: "110"
  - name: aap-instance
    path: charts/instances/aap-instance
    namespace: aap
    wave: "115"
  - name: rhbk-instance
    path: charts/instances/rhbk-instance
    namespace: rhbk
    wave: "120"
  - name: gitea-instance
    path: charts/instances/gitea-instance
    namespace: gitea
    wave: "125"
  - name: odf-noobaa
    path: charts/instances/odf-noobaa
    namespace: openshift-storage
    wave: "130"
  - name: quay-instance
    path: charts/instances/quay-instance
    namespace: quay
    wave: "140"
  - name: rhacm-instance
    path: charts/instances/rhacm-instance
    namespace: open-cluster-management
    wave: "150"
  - name: rhacs-instance
    path: charts/instances/rhacs-instance
    namespace: stackrox
    wave: "155"
  - name: vault-init
    path: charts/config/vault-init
    namespace: vault
    wave: "200"
  - name: keycloak-config
    path: charts/config/keycloak-config
    namespace: rhbk
    wave: "210"
  - name: external-secrets-config
    path: charts/config/external-secrets-config
    namespace: sovereign-cloud
    wave: "220"
  - name: service-oidc-config
    path: charts/config/service-oidc-config
    namespace: sovereign-cloud
    wave: "230"
  - name: rhacs-config
    path: charts/config/rhacs-config
    namespace: stackrox
    wave: "240"
  - name: rhacm-config
    path: charts/config/rhacm-config
    namespace: open-cluster-management
    wave: "245"
  - name: argocd-init-job
    path: charts/gitops/argocd-init-job
    namespace: openshift-gitops
    wave: "250"
  # NOTE: custom-operators-git-creds, custom-operators-pipelines,
  # custom-operators-applicationset, and dynamic-plugins-config
  # are intentionally removed. Custom operators (hybridsovereign.redhat)
  # are deployed separately via make deploy-custom-operators after the
  # platform wave is healthy. Add them back here when rebuilding.

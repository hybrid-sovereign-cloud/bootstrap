apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSetName }}
  namespace: openshift-gitops
  labels:
    {{- include "chart.labels" . | nindent 4 }}
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=default
  generators:
    - list:
        elements:
        {{- range .Values.operators }}
          - name: {{ .name | quote }}
            repoURL: {{ .repoURL | quote }}
            path: {{ .path | quote }}
            namespace: {{ .namespace | quote }}
            wave: {{ .wave | quote }}
            imageTag: {{ .imageTag | quote }}
        {{- end }}
  template:
    metadata:
      name: '{{ "{{ .name }}" }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ "{{ .wave }}" }}'
      labels:
        argocd.argoproj.io/application-set: {{ .Values.applicationSetName | quote }}
    spec:
      project: default
      source:
        repoURL: '{{ "{{ .repoURL }}" }}'
        targetRevision: {{ .Values.revision | quote }}
        path: '{{ "{{ .path }}" }}'
        helm:
          releaseName: '{{ "{{ .name }}" }}'
          parameters:
            - name: image.tag
              value: '{{ "{{ .imageTag }}" }}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{ "{{ .namespace }}" }}'
      ignoreDifferences:
        # ImageStreams are updated by the build pipeline; ignore tag/status drift
        - group: image.openshift.io
          kind: ImageStream
          jsonPointers:
            - /spec/tags
            - /status
        # Ansible operators update status via operator_sdk.util.k8s_status
        - group: hybridsovereign.redhat
          kind: CloudAWS
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: CloudOSO
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: PlatformOpenshift
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Team
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Projects
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Assignment
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Entity
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Container
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: Rbac
          jsonPointers:
            - /status
        - group: hybridsovereign.redhat
          kind: RbacConfig
          jsonPointers:
            - /status
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - RespectIgnoreDifferences=true

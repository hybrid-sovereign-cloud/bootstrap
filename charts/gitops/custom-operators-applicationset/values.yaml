applicationSetName: custom-operators-appset

# GitHub org base URL (HTTPS, no trailing slash)
githubOrg: https://github.com/hybrid-sovereign-cloud

# Git revision (branch) to track in each operator repo
revision: main

# Namespace where all operators (except plugin_rbac) run
defaultNamespace: sovereign-cloud

# One entry per custom operator.
# repoURL     – full HTTPS URL of the operator's GitHub repo
# path        – path to the operator Helm chart inside the repo
# namespace   – Kubernetes namespace the Helm release is installed into
# wave        – ArgoCD sync-wave annotation (string)
# imageTag    – Helm parameter image.tag passed to the chart
operators:
  - name: plugin-rbac
    repoURL: https://github.com/hybrid-sovereign-cloud/plugin_rbac.git
    path: helm/rbac-plugin-operator
    namespace: sovereign-cloud-plugins
    wave: "300"
    imageTag: latest

  - name: entity-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/sovereign_tenancy.git
    path: helm/entity-operator
    namespace: sovereign-cloud
    wave: "310"
    imageTag: latest

  - name: cloudaws-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/CloudAWS.git
    path: helm/cloudaws-operator
    namespace: sovereign-cloud
    wave: "320"
    imageTag: latest

  - name: cloudoso-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/CloudOSO.git
    path: helm/cloudoso-operator
    namespace: sovereign-cloud
    wave: "320"
    imageTag: latest

  - name: platformopenshift-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/PlatformOpenshift.git
    path: helm/platformopenshift-operator
    namespace: sovereign-cloud
    wave: "330"
    imageTag: latest

  - name: team-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/Team.git
    path: helm/team-operator
    namespace: sovereign-cloud
    wave: "330"
    imageTag: latest

  - name: projects-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/Projects.git
    path: helm/projects-operator
    namespace: sovereign-cloud
    wave: "340"
    imageTag: latest

  - name: assignment-operator
    repoURL: https://github.com/hybrid-sovereign-cloud/Assignment.git
    path: helm/assignment-operator
    namespace: sovereign-cloud
    wave: "340"
    imageTag: latest

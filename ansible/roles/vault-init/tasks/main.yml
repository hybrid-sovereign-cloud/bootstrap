---
- name: Check Vault initialization status
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/init"
    method: GET
    validate_certs: false
    status_code: [200]
  register: vault_init_status
  retries: 10
  delay: 10
  until: vault_init_status.status == 200

- name: Initialize Vault when not initialized
  when: not vault_init_status.json.initialized
  block:
    - name: Initialize Vault
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/init"
        method: PUT
        validate_certs: false
        body_format: json
        body:
          secret_shares: "{{ vault_key_shares }}"
          secret_threshold: "{{ vault_key_threshold }}"
        status_code: [200]
      register: vault_init_response
      retries: 3
      delay: 5
      until: vault_init_response.status == 200

    - name: Set init data from initialization response
      ansible.builtin.set_fact:
        vault_root_token: "{{ vault_init_response.json.root_token }}"
        vault_unseal_keys: "{{ vault_init_response.json['keys'] }}"
        vault_unseal_keys_base64: "{{ vault_init_response.json['keys_base64'] }}"

    - name: Store init secrets as Kubernetes Secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ vault_secret_name }}"
            namespace: "{{ vault_namespace }}"
          type: Opaque
          stringData:
            root_token: "{{ vault_root_token }}"
            unseal_keys: "{{ vault_unseal_keys | to_json }}"
            unseal_keys_base64: "{{ vault_unseal_keys_base64 | to_json }}"
      retries: 3
      delay: 5

- name: Load existing credentials when already initialized
  when: vault_init_status.json.initialized
  block:
    - name: Retrieve existing secrets
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ vault_secret_name }}"
        namespace: "{{ vault_namespace }}"
      register: existing_secret
      retries: 5
      delay: 5
      until: existing_secret.resources | length > 0

    - name: Load credentials from secret
      ansible.builtin.set_fact:
        vault_root_token: "{{ (existing_secret.resources[0].data.root_token | b64decode) }}"
        vault_unseal_keys: "{{ (existing_secret.resources[0].data.unseal_keys | b64decode) | from_json }}"

- name: Discover Vault pods
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ vault_namespace }}"
    label_selectors:
      - "app.kubernetes.io/name=vault"
      - "component=server"
  register: vault_pods
  retries: 5
  delay: 5
  until: vault_pods.resources | length > 0

- name: Build list of Vault pod addresses
  ansible.builtin.set_fact:
    vault_pod_addrs: "{{ vault_pods.resources | map(attribute='metadata') | map(attribute='name') | map('regex_replace', '^(.*)$', 'http://\\1.vault-internal.' + vault_namespace + '.svc:8200') | list }}"

- name: Unseal each Vault pod directly
  ansible.builtin.include_tasks: unseal-pod.yml
  loop: "{{ vault_pod_addrs }}"
  loop_control:
    loop_var: pod_addr

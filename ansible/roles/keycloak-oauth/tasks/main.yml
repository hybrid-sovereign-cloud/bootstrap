---
- name: Create OAuth secret for central cluster
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sovereign-central-oauth-secret
        namespace: openshift-config
      type: Opaque
      stringData:
        clientSecret: "{{ keycloak_client_secrets[central_oauth_client_id] }}"
  retries: 5
  delay: 5

- name: Add Keycloak as OAuth identity provider on central cluster
  kubernetes.core.k8s:
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: OAuth
      metadata:
        name: cluster
      spec:
        identityProviders:
          - name: sovereign-central
            type: OpenID
            mappingMethod: claim
            openID:
              clientID: "{{ central_oauth_client_id }}"
              clientSecret:
                name: sovereign-central-oauth-secret
              issuer: "{{ keycloak_central_url }}/realms/{{ central_realm }}"
              claims:
                preferredUsername:
                  - preferred_username
                name:
                  - name
                email:
                  - email
                groups:
                  - groups
  retries: 3
  delay: 10

- name: Create OAuth secret for services cluster
  kubernetes.core.k8s:
    host: "{{ ocp_services_server }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: sovereign-services-oauth-secret
        namespace: openshift-config
      type: Opaque
      stringData:
        clientSecret: "{{ keycloak_client_secrets[services_oauth_client_id] }}"
  retries: 5
  delay: 5
  when: ocp_services_server | length > 0

- name: Add Keycloak as OAuth identity provider on services cluster
  kubernetes.core.k8s:
    host: "{{ ocp_services_server }}"
    validate_certs: false
    state: present
    merge_type: merge
    definition:
      apiVersion: config.openshift.io/v1
      kind: OAuth
      metadata:
        name: cluster
      spec:
        identityProviders:
          - name: sovereign-services
            type: OpenID
            mappingMethod: claim
            openID:
              clientID: "{{ services_oauth_client_id }}"
              clientSecret:
                name: sovereign-services-oauth-secret
              issuer: "{{ keycloak_services_url }}/realms/{{ services_realm }}"
              claims:
                preferredUsername:
                  - preferred_username
                name:
                  - name
                email:
                  - email
                groups:
                  - groups
  retries: 3
  delay: 10
  when: ocp_services_server | length > 0

---
- name: Define operator DE and rulebook registry
  ansible.builtin.set_fact:
    eda_operators:
      - name: entity
        de_image: "{{ de_registry }}/de-entity:{{ de_tag }}"
        rulebooks:
          - { name: "entity-create", file: "entity-create.yml" }
          - { name: "entity-delete", file: "entity-delete.yml" }
      - name: team
        de_image: "{{ de_registry }}/de-team:{{ de_tag }}"
        rulebooks:
          - { name: "team-create", file: "team-create.yml" }
          - { name: "team-delete", file: "team-delete.yml" }
      - name: assignment
        de_image: "{{ de_registry }}/de-assignment:{{ de_tag }}"
        rulebooks:
          - { name: "assignment-create", file: "assignment-create.yml" }
          - { name: "assignment-delete", file: "assignment-delete.yml" }
      - name: project
        de_image: "{{ de_registry }}/de-project:{{ de_tag }}"
        rulebooks:
          - { name: "project-create", file: "project-create.yml" }
          - { name: "project-delete", file: "project-delete.yml" }
      - name: platformopenshift
        de_image: "{{ de_registry }}/de-platformopenshift:{{ de_tag }}"
        rulebooks:
          - { name: "platformopenshift-create", file: "platformopenshift-create.yml" }
          - { name: "platformopenshift-delete", file: "platformopenshift-delete.yml" }
      - name: cloudoso
        de_image: "{{ de_registry }}/de-cloudoso:{{ de_tag }}"
        rulebooks:
          - { name: "cloudoso-create", file: "cloudoso-create.yml" }
          - { name: "cloudoso-delete", file: "cloudoso-delete.yml" }
      - name: cloudaws
        de_image: "{{ de_registry }}/de-cloudaws:{{ de_tag }}"
        rulebooks:
          - { name: "cloudaws-create", file: "cloudaws-create.yml" }
          - { name: "cloudaws-delete", file: "cloudaws-delete.yml" }
      - name: persona
        de_image: "{{ de_registry }}/de-persona:{{ de_tag }}"
        rulebooks:
          - { name: "persona-create", file: "persona-create.yml" }
          - { name: "persona-delete", file: "persona-delete.yml" }
      - name: plugin-rbac
        de_image: "{{ de_registry }}/de-plugin-rbac:{{ de_tag }}"
        rulebooks:
          - { name: "rbacconfig-create", file: "rbacconfig-create.yml" }
          - { name: "rbacconfig-delete", file: "rbacconfig-delete.yml" }
          - { name: "rbac-create", file: "rbac-create.yml" }
          - { name: "rbac-delete", file: "rbac-delete.yml" }
      - name: plugin-vault
        de_image: "{{ de_registry }}/de-plugin-vault:{{ de_tag }}"
        rulebooks:
          - { name: "vault-create", file: "vault-create.yml" }
          - { name: "vault-delete", file: "vault-delete.yml" }
          - { name: "vaultkv-create", file: "vaultkv-create.yml" }
          - { name: "vaultkv-delete", file: "vaultkv-delete.yml" }
      - name: plugin-aap
        de_image: "{{ de_registry }}/de-plugin-aap:{{ de_tag }}"
        rulebooks:
          - { name: "aapconfig-create", file: "aapconfig-create.yml" }
          - { name: "aapconfig-delete", file: "aapconfig-delete.yml" }
          - { name: "aaporg-create", file: "aaporg-create.yml" }
          - { name: "aaporg-delete", file: "aaporg-delete.yml" }
      - name: plugin-quay
        de_image: "{{ de_registry }}/de-plugin-quay:{{ de_tag }}"
        rulebooks:
          - { name: "quayconfig-create", file: "quayconfig-create.yml" }
          - { name: "quayconfig-delete", file: "quayconfig-delete.yml" }
          - { name: "quayorg-create", file: "quayorg-create.yml" }
          - { name: "quayorg-delete", file: "quayorg-delete.yml" }
      - name: plugin-iaac
        de_image: "{{ de_registry }}/de-plugin-iaac:{{ de_tag }}"
        rulebooks:
          - { name: "iaac-create", file: "iaac-create.yml" }
          - { name: "iaac-delete", file: "iaac-delete.yml" }

- name: Register Decision Environments
  ansible.eda.decision_environment:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "de-{{ item.name }}"
    image_url: "{{ item.de_image }}"
    organization_name: "{{ eda_organization }}"
    state: present
  loop: "{{ eda_operators }}"
  loop_control:
    label: "de-{{ item.name }}"
  no_log: true

- name: Create Event Stream credential
  ansible.eda.credential:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ event_stream_name }}-credential"
    credential_type_name: "Token Event Stream"
    organization_name: "{{ eda_organization }}"
    inputs:
      token: "{{ event_stream_token }}"
    state: present
  no_log: true

- name: Create Event Stream
  ansible.eda.event_stream:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ event_stream_name }}"
    credential_name: "{{ event_stream_name }}-credential"
    organization_name: "{{ eda_organization }}"
    state: present
  no_log: true

- name: Delete existing EDA project if in failed import state
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/?name=sovereign-eda-rulebooks"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: existing_project
  no_log: false

- name: Remove failed project to allow recreation with credentials
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/{{ existing_project.json.results[0].id }}/"
    method: DELETE
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [204]
  when:
    - existing_project.json.results | length > 0
    - existing_project.json.results[0].import_state in ['failed', 'pending']
  no_log: false

- name: Create EDA Project for sovereign rulebooks (authenticated URL for private repo)
  ansible.eda.project:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "sovereign-eda-rulebooks"
    url: "{{ lookup('env', 'RULEBOOK_REPO_URL') | regex_replace('^https://', 'https://' + github_token + '@') }}"
    organization_name: "{{ eda_organization }}"
    state: present
  no_log: true

- name: Wait for EDA project to be imported (up to 5 min)
  ansible.builtin.uri:
    url: "{{ eda_controller_url }}/api/eda/v1/projects/?name=sovereign-eda-rulebooks"
    method: GET
    validate_certs: false
    url_username: "{{ eda_admin_username }}"
    url_password: "{{ eda_admin_password }}"
    force_basic_auth: true
    status_code: [200]
  register: project_status
  retries: 30
  delay: 10
  until: project_status.json.results[0].import_state == 'completed'
  no_log: false

- name: Create Rulebook Activations
  ansible.eda.rulebook_activation:
    controller_host: "{{ eda_controller_url }}"
    controller_username: "{{ eda_admin_username }}"
    controller_password: "{{ eda_admin_password }}"
    validate_certs: false
    name: "{{ item.1.name }}-activation"
    project_name: "sovereign-eda-rulebooks"
    rulebook_name: "{{ item.1.file }}"
    decision_environment_name: "de-{{ item.0.name }}"
    organization_name: "{{ eda_organization }}"
    restart_policy: "on-failure"
    event_streams:
      - event_stream: "{{ event_stream_name }}"
        source_index: 0
    state: present
  loop: "{{ eda_operators | subelements('rulebooks') }}"
  loop_control:
    label: "{{ item.1.name }}-activation"
  no_log: true

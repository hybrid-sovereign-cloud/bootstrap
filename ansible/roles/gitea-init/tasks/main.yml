---
- name: Get Gitea admin password from deployment
  kubernetes.core.k8s_info:
    kind: Deployment
    name: gitea
    namespace: gitea
  register: gitea_deploy
  retries: 10
  delay: 10
  until: gitea_deploy.resources | length > 0

- name: Extract admin password from init container env
  ansible.builtin.set_fact:
    gitea_admin_password: >-
      {{ gitea_deploy.resources[0].spec.template.spec.initContainers
         | selectattr('name', 'equalto', 'configure-gitea')
         | map(attribute='env') | first
         | selectattr('name', 'equalto', 'GITEA_ADMIN_PASSWORD')
         | map(attribute='value') | first }}
    gitea_admin_user: >-
      {{ gitea_deploy.resources[0].spec.template.spec.initContainers
         | selectattr('name', 'equalto', 'configure-gitea')
         | map(attribute='env') | first
         | selectattr('name', 'equalto', 'GITEA_ADMIN_USERNAME')
         | map(attribute='value') | first }}

- name: Wait for Gitea API to be reachable
  ansible.builtin.uri:
    url: "{{ gitea_url }}/api/v1/users/{{ gitea_admin_user }}"
    method: GET
    validate_certs: false
    status_code: [200, 404]
  register: gitea_user_check
  retries: 30
  delay: 10
  until: gitea_user_check.status is defined

- name: Generate admin API token
  ansible.builtin.uri:
    url: "{{ gitea_url }}/api/v1/users/{{ gitea_admin_user }}/tokens"
    method: POST
    user: "{{ gitea_admin_user }}"
    password: "{{ gitea_admin_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "sovereign-admin-token"
      scopes:
        - "all"
    status_code: [201, 422]
  register: gitea_token_result
  retries: 3
  delay: 10

- name: Set Gitea admin token
  ansible.builtin.set_fact:
    gitea_admin_token: "{{ gitea_token_result.json.sha1 | default('') }}"
  when: gitea_token_result.status == 201

- name: Set Gitea credentials fact
  ansible.builtin.set_fact:
    gitea_credentials:
      admin_user: "{{ gitea_admin_user }}"
      admin_password: "{{ gitea_admin_password }}"
      admin_token: "{{ gitea_admin_token | default('existing-token') }}"

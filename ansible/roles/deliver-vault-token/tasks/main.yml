---
- name: Read vault-init-secrets from central cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vault_secret_name }}"
    namespace: "{{ vault_secret_namespace }}"
  register: vault_secret

- name: Fail if vault-init-secrets not found
  ansible.builtin.fail:
    msg: "Secret {{ vault_secret_name }} not found in namespace {{ vault_secret_namespace }}"
  when: vault_secret.resources | length == 0

- name: Extract root_token
  ansible.builtin.set_fact:
    root_token: "{{ vault_secret.resources[0].data.root_token | b64decode }}"

- name: Get services cluster API token
  ansible.builtin.uri:
    url: "{{ services_server }}/oauth/authorize?response_type=token&client_id=openshift-challenging-client"
    method: GET
    validate_certs: false
    force_basic_auth: true
    url_username: "{{ lookup('env', 'OCP_SERVICES_USERNAME') | default('kubeadmin', true) }}"
    url_password: "{{ lookup('env', 'OCP_SERVICES_PASSWORD') }}"
    status_code: [302]
    follow_redirects: none
  register: oauth_response

- name: Extract bearer token from OAuth redirect
  ansible.builtin.set_fact:
    services_bearer_token: "{{ oauth_response.location | regex_search('access_token=([^&]+)', '\\1') | first }}"

- name: Ensure target namespace exists on services cluster
  kubernetes.core.k8s:
    host: "{{ services_server }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ lookup('env', 'TARGET_NAMESPACE') | default(target_namespace, true) }}"
  retries: 3
  delay: 5

- name: Create vault-central-token secret on services cluster
  kubernetes.core.k8s:
    host: "{{ services_server }}"
    api_key: "{{ services_bearer_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ lookup('env', 'TARGET_SECRET_NAME') | default(target_secret_name, true) }}"
        namespace: "{{ lookup('env', 'TARGET_NAMESPACE') | default(target_namespace, true) }}"
      type: Opaque
      stringData:
        root_token: "{{ root_token }}"

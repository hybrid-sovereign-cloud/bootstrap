---
- name: Initialize Gitea admin and token
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitea_url: "{{ lookup('env', 'GITEA_URL') }}"
    gitea_admin_user: "{{ lookup('env', 'GITEA_ADMIN_USER') | default('gitea_admin', true) }}"
    gitea_admin_password: "{{ lookup('env', 'GITEA_ADMIN_PASSWORD') | default('', true) }}"
    gitea_admin_email: "{{ lookup('env', 'GITEA_ADMIN_EMAIL') | default('admin@sovereign.local', true) }}"

  pre_tasks:
    - name: Wait for Gitea to be reachable
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/version"
        method: GET
        validate_certs: false
        status_code: [200]
      retries: 30
      delay: 10
      register: gitea_health
      until: gitea_health.status == 200

  roles:
    - gitea-init

  post_tasks:
    - name: Store Gitea credentials as K8s secret for PushSecret pickup
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: gitea-credentials
            namespace: "{{ lookup('env', 'SECRETS_NAMESPACE') | default('sovereign-jobs', true) }}"
            labels:
              sovereign.io/push-to-vault: "true"
          type: Opaque
          stringData:
            admin_user: "{{ gitea_credentials.admin_user }}"
            admin_password: "{{ gitea_credentials.admin_password }}"
            admin_token: "{{ gitea_credentials.admin_token }}"
      when: gitea_credentials is defined and gitea_credentials.admin_token != 'existing-token'

---
- name: Configure Keycloak RBAC (ClusterRoleBindings)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    admin_group: "{{ lookup('env', 'ADMIN_GROUP') | default('sovereign-admin', true) }}"
    ocp_services_server: "{{ lookup('env', 'OCP_SERVICES_SERVER') }}"

  pre_tasks:
    - name: Fetch ArgoCD cluster secret for services cluster
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: openshift-gitops
        label_selectors:
          - "argocd.argoproj.io/secret-type=cluster"
      register: argo_cluster_secrets
      retries: 5
      delay: 5
      when: ocp_services_server | length > 0

    - name: Parse services cluster credentials
      ansible.builtin.set_fact:
        services_cluster_config: "{{ (argo_cluster_secrets.resources | first).data.config | b64decode | from_json }}"
      when:
        - ocp_services_server | length > 0
        - argo_cluster_secrets.resources | length > 0

    - name: Set services cluster auth vars
      ansible.builtin.set_fact:
        services_cluster_token: "{{ services_cluster_config.bearerToken | default('') }}"
        services_cluster_username: "{{ services_cluster_config.username | default('') }}"
        services_cluster_password: "{{ services_cluster_config.password | default('') }}"
      when:
        - ocp_services_server | length > 0
        - argo_cluster_secrets.resources | length > 0

  roles:
    - keycloak-rbac

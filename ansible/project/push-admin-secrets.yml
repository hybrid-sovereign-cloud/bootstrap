---
- name: Push admin secrets from services cluster to central Vault
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') | default('http://vault-active.vault.svc:8200', true) }}"
    vault_namespace: "vault"
    vault_secret_name: "vault-init-secrets"
    vault_kv_path: "central"
    ocp_services_server: "{{ lookup('env', 'OCP_SERVICES_SERVER') }}"

  pre_tasks:
    - name: Retrieve Vault root token
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ vault_secret_name }}"
        namespace: "{{ vault_namespace }}"
      register: vault_secret
      retries: 10
      delay: 10
      until: vault_secret.resources | length > 0

    - name: Set root token
      ansible.builtin.set_fact:
        vault_token: "{{ (vault_secret.resources[0].data.root_token | b64decode) }}"

    - name: Get services cluster bearer token
      kubernetes.core.k8s_info:
        kind: Secret
        name: argocd-cluster-services
        namespace: openshift-gitops
      register: services_cluster_secret
      retries: 5
      delay: 10
      until: services_cluster_secret.resources | length > 0

    - name: Set services bearer token
      ansible.builtin.set_fact:
        services_bearer_token: "{{ (services_cluster_secret.resources[0].data.config | b64decode | from_json).bearerToken }}"

  roles:
    - role: push-admin-secrets
      vars:
        services_api_server: "{{ ocp_services_server }}"

---
- name: Create Keycloak clients
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    keycloak_url: "{{ lookup('env', 'KEYCLOAK_URL') }}"
    keycloak_admin_user: "{{ lookup('env', 'KEYCLOAK_ADMIN_USER') | default('admin', true) }}"
    keycloak_admin_password: "{{ lookup('env', 'KEYCLOAK_ADMIN_PASSWORD') }}"
    realm_name: "{{ lookup('env', 'REALM_NAME') | default('sovereign-central', true) }}"
    clients_json: "{{ lookup('env', 'KEYCLOAK_CLIENTS') | default('[]', true) }}"

  pre_tasks:
    - name: Wait for Keycloak to be reachable
      ansible.builtin.uri:
        url: "{{ keycloak_url }}/realms/master"
        method: GET
        validate_certs: false
        status_code: [200]
      retries: 30
      delay: 10
      register: kc_health
      until: kc_health.status == 200

    - name: Authenticate to Keycloak
      ansible.builtin.include_role:
        name: keycloak-auth

    - name: Parse clients from environment
      ansible.builtin.set_fact:
        keycloak_clients: "{{ clients_json | from_json }}"

  roles:
    - keycloak-clients

  post_tasks:
    - name: Store client secrets as K8s secret for PushSecret pickup
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-client-secrets
            namespace: "{{ lookup('env', 'SECRETS_NAMESPACE') | default('sovereign-jobs', true) }}"
            labels:
              sovereign.io/push-to-vault: "true"
          type: Opaque
          stringData: "{{ keycloak_client_secrets }}"
      when: keycloak_client_secrets is defined and keycloak_client_secrets | length > 0

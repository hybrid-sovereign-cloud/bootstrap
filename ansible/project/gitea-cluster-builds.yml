---
# Playbook: gitea-cluster-builds.yml
# Purpose:
#   1. Create the cluster_builds Gitea repository (idempotent).
#   2. Initialize the aws/ directory with a .gitkeep placeholder.
#   3. Create the ArgoCD repository secret in openshift-gitops so the
#      ApplicationSet can pull from cluster_builds without manual config.
#
# Credentials are read from the gitea-admin-credentials Kubernetes Secret
# (managed by External Secrets Operator from Vault central/gitea-admin).
# No credentials are embedded in Git.

- name: Bootstrap cluster_builds Gitea repository and ArgoCD repo secret
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitea_url: "{{ lookup('env', 'GITEA_URL') }}"
    gitea_admin_user: "{{ lookup('env', 'GITEA_ADMIN_USER') | default('gitea_admin', true) }}"
    gitea_admin_password: "{{ lookup('env', 'GITEA_ADMIN_PASSWORD') }}"
    repo_name: cluster_builds
    argocd_namespace: "{{ lookup('env', 'ARGOCD_NAMESPACE') | default('openshift-gitops', true) }}"
    gitea_credentials_secret: "{{ lookup('env', 'GITEA_CREDENTIALS_SECRET') | default('gitea-admin-credentials', true) }}"
    gitea_credentials_namespace: "{{ lookup('env', 'GITEA_CREDENTIALS_NAMESPACE') | default('sovereign-cloud-jobs', true) }}"

  pre_tasks:
    - name: Wait for Gitea to be reachable
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/version"
        method: GET
        validate_certs: false
        status_code: [200]
      retries: 30
      delay: 10
      register: gitea_health
      until: gitea_health.status == 200

  tasks:
    # ── 1. Create cluster_builds repository ──────────────────────────────────

    - name: Check if cluster_builds repository already exists
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_admin_user }}/{{ repo_name }}"
        method: GET
        user: "{{ gitea_admin_user }}"
        password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 404]
      register: repo_check

    - name: Create cluster_builds repository
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/user/repos"
        method: POST
        user: "{{ gitea_admin_user }}"
        password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          name: "{{ repo_name }}"
          description: "GitOps cluster build definitions — ApplicationSet source for aws/ workloads"
          private: false
          auto_init: true
          default_branch: main
          readme: Default
        status_code: [201]
      register: repo_create
      when: repo_check.status == 404

    - name: Log repository status
      ansible.builtin.debug:
        msg: >-
          {{ 'Created: ' ~ repo_create.json.html_url
             if repo_check.status == 404
             else 'Already exists: ' ~ repo_check.json.html_url }}

    # ── 2. Initialise aws/ directory with .gitkeep ───────────────────────────

    - name: Check if aws/.gitkeep already exists
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_admin_user }}/{{ repo_name }}/contents/aws/.gitkeep"
        method: GET
        user: "{{ gitea_admin_user }}"
        password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code: [200, 404]
      register: gitkeep_check

    - name: Create aws/.gitkeep placeholder
      ansible.builtin.uri:
        url: "{{ gitea_url }}/api/v1/repos/{{ gitea_admin_user }}/{{ repo_name }}/contents/aws/.gitkeep"
        method: POST
        user: "{{ gitea_admin_user }}"
        password: "{{ gitea_admin_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: json
        body:
          message: "chore: initialise aws/ directory for ApplicationSet discovery"
          content: ""
          branch: main
        status_code: [201]
      when: gitkeep_check.status == 404

    # ── 3. Read Gitea admin token from ESO-managed Kubernetes Secret ──────────
    #      The gitea-admin-credentials secret is owned by ExternalSecret in
    #      sovereign-cloud-jobs; token comes from Vault central/gitea-admin.

    - name: Read gitea-admin-credentials secret
      kubernetes.core.k8s_info:
        kind: Secret
        name: "{{ gitea_credentials_secret }}"
        namespace: "{{ gitea_credentials_namespace }}"
      register: gitea_secret_info

    - name: Decode admin_token from secret
      ansible.builtin.set_fact:
        gitea_admin_token: >-
          {{ gitea_secret_info.resources[0].data.admin_token | b64decode }}

    # ── 4. Create ArgoCD repository secret in openshift-gitops ───────────────
    #      ArgoCD discovers repository secrets via the
    #      argocd.argoproj.io/secret-type=repository label.

    - name: Create ArgoCD repo secret for cluster_builds
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-builds-gitea-repo
            namespace: "{{ argocd_namespace }}"
            labels:
              argocd.argoproj.io/secret-type: repository
              app.kubernetes.io/part-of: hybrid-sovereign-cloud
              app.kubernetes.io/managed-by: sovereign-ansible-jobs
          type: Opaque
          stringData:
            type: git
            url: "{{ gitea_url }}/{{ gitea_admin_user }}/{{ repo_name }}.git"
            username: "{{ gitea_admin_user }}"
            password: "{{ gitea_admin_token }}"

    - name: Log ArgoCD repo secret status
      ansible.builtin.debug:
        msg: "ArgoCD repo secret cluster-builds-gitea-repo created/updated in {{ argocd_namespace }}"

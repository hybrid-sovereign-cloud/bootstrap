---
- name: Configure EDA Decision Environments and Rulebook Activations
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    eda_controller_url: "{{ lookup('env', 'EDA_CONTROLLER_URL') }}"
    eda_organization: "Default"
    de_registry: "quay.signal9.gg/hybrid-sovereign"
    de_tag: "0.1.0"
    event_stream_name: "sovereign-operator-events"

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - eda_controller_url | length > 0
        fail_msg: "EDA_CONTROLLER_URL environment variable is required"

    - name: Read EDA admin password from Kubernetes secret
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: aap
        name: sovereign-aap-eda-admin-password
      register: eda_secret_raw
      no_log: true

    - name: Set EDA admin credentials
      ansible.builtin.set_fact:
        eda_admin_username: "admin"
        eda_admin_password: "{{ eda_secret_raw.resources[0].data.password | b64decode }}"
      no_log: true

    - name: Read event-stream token from Kubernetes secret
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: sovereign-cloud-jobs
        name: event-stream-token
      register: event_stream_secret_raw
      no_log: true

    - name: Set event-stream token fact
      ansible.builtin.set_fact:
        event_stream_token: "{{ event_stream_secret_raw.resources[0].data.token | b64decode }}"
      no_log: true

    - name: Read GitHub token from ArgoCD repo secret
      kubernetes.core.k8s_info:
        kind: Secret
        namespace: openshift-gitops
        name: sovereign-bootstrap-repo
      register: github_secret_raw
      no_log: true

    - name: Set GitHub token fact
      ansible.builtin.set_fact:
        github_token: "{{ github_secret_raw.resources[0].data.password | b64decode }}"
      no_log: true

  roles:
    - eda-config

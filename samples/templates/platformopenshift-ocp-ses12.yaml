{{- if .Values.samples.platformopenshift.ocp_ses12.enabled }}
---
# PlatformOpenshift for ocp-ses12 — OpenStack cluster using ses12-env
# Prerequisites: CloudOSO ses12-env status.ready == true
# Apply manually to services cluster after ses12-env CloudOSO is ready.
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses12
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses12-env"
    controlPlaneCount: 3
    workerCount: 2
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "ext-net"
{{- end }}

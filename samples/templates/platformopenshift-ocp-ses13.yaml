{{- if .Values.samples.platformopenshift.ocp_ses13.enabled }}
---
# PlatformOpenshift for ocp-ses13 — OpenStack cluster using ses13-env (internet-facing)
# Prerequisites: CloudOSO ses13-env status.ready == true
apiVersion: hybridsovereign.redhat/v1alpha1
kind: PlatformOpenshift
metadata:
  name: ocp-ses13
  namespace: entity-acme-corp
spec:
  type: openstack
  openstack:
    environment: "ses13-env"
    controlPlaneCount: 3
    workerCount: 2
    controlPlaneFlavor: "b1.xlarge"
    workerFlavor: "b1.large"
    externalNetwork: "internet"
{{- end }}
